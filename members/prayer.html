<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0A3D62">
  <title>Prayer Requests | Emmanuel Gospel Centre</title>

  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="/firebase-config.js"></script>
  <script src="/js/member-auth.js"></script>
</head>
<body class="bg-zinc-50 font-sans">

  <div id="nav-placeholder"></div>

  <!-- PAGE HEADER -->
  <div class="bg-[#0A3D62] text-white py-10 px-6">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
      <div>
        <h1 class="text-3xl font-bold tracking-tight">Prayer Requests</h1>
        <p class="text-blue-200 mt-1">Share your needs and stand with others in prayer</p>
      </div>
      <button onclick="toggleForm()"
              class="bg-amber-500 hover:bg-amber-600 text-white px-6 py-2.5 rounded-full text-sm font-medium transition-all">
        <i class="fas fa-plus mr-2"></i>New Request
      </button>
    </div>
  </div>

  <!-- SUBMIT FORM -->
  <div id="prayer-form" class="hidden bg-white border-b shadow-sm">
    <div class="max-w-2xl mx-auto px-6 py-8">
      <h2 class="text-xl font-bold text-[#0A3D62] mb-6">Submit a Prayer Request</h2>
      <div class="space-y-5">
        <div>
          <label class="block text-sm font-medium text-zinc-700 mb-1">Prayer Request</label>
          <textarea id="prayer-body" rows="4" placeholder="Share what you'd like the community to pray for..."
                    class="w-full border border-zinc-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400 resize-none"></textarea>
        </div>
        <div class="flex flex-col sm:flex-row gap-4">
          <label class="flex items-center gap-2 cursor-pointer select-none">
            <input type="checkbox" id="is-anonymous" class="w-4 h-4 accent-amber-500">
            <span class="text-sm text-zinc-600">Submit anonymously</span>
          </label>
          <label class="flex items-center gap-2 cursor-pointer select-none">
            <input type="checkbox" id="is-private" class="w-4 h-4 accent-amber-500">
            <span class="text-sm text-zinc-600">Private (admins only)</span>
          </label>
        </div>
        <div class="flex gap-3">
          <button onclick="submitPrayer()"
                  class="bg-amber-500 hover:bg-amber-600 text-white px-6 py-2.5 rounded-full text-sm font-medium transition-all">
            Submit Request
          </button>
          <button onclick="toggleForm()"
                  class="border border-zinc-200 hover:border-zinc-300 text-zinc-600 px-6 py-2.5 rounded-full text-sm font-medium transition-all">
            Cancel
          </button>
        </div>
        <p id="form-msg" class="hidden text-sm font-medium"></p>
      </div>
    </div>
  </div>

  <!-- FILTER TABS -->
  <div class="bg-white border-b px-6">
    <div class="max-w-7xl mx-auto flex gap-6 text-sm font-medium overflow-x-auto">
      <button onclick="setFilter('all')" id="tab-all"
              class="py-3 border-b-2 border-amber-500 text-amber-600 transition-colors whitespace-nowrap">
        All
      </button>
      <button onclick="setFilter('active')" id="tab-active"
              class="py-3 border-b-2 border-transparent text-zinc-500 hover:text-zinc-700 transition-colors whitespace-nowrap">
        Active
      </button>
      <button onclick="setFilter('answered')" id="tab-answered"
              class="py-3 border-b-2 border-transparent text-zinc-500 hover:text-zinc-700 transition-colors whitespace-nowrap">
        Answered
      </button>
      <button onclick="setFilter('mine')" id="tab-mine"
              class="py-3 border-b-2 border-transparent text-zinc-500 hover:text-zinc-700 transition-colors whitespace-nowrap">
        My Requests
      </button>
    </div>
  </div>

  <!-- PRAYER LIST -->
  <main class="max-w-7xl mx-auto px-6 py-8">
    <div id="loading" class="text-center py-16 text-zinc-400">
      <i class="fas fa-spinner fa-spin text-3xl mb-3"></i>
      <p>Loading prayer requests...</p>
    </div>
    <div id="empty" class="hidden text-center py-16 text-zinc-400">
      <i class="fas fa-hands-praying text-5xl mb-4 opacity-30"></i>
      <p class="text-lg font-medium">No prayer requests</p>
    </div>
    <div id="prayer-list" class="space-y-4"></div>
  </main>

  <script src="/js/nav.js"></script>
  <script src="/js/main.js"></script>
  <script>
    const db = firebase.firestore();
    let currentUser = null;
    let currentFilter = 'all';
    let allRequests = [];

    auth.onAuthStateChanged((user) => { currentUser = user; });

    function toggleForm() {
      const form = document.getElementById('prayer-form');
      form.classList.toggle('hidden');
      document.getElementById('form-msg').classList.add('hidden');
    }

    const FILTER_IDS = ['all', 'active', 'answered', 'mine'];

    function setFilter(filter) {
      currentFilter = filter;
      FILTER_IDS.forEach((f) => {
        const tab = document.getElementById('tab-' + f);
        if (f === filter) {
          tab.classList.add('border-amber-500', 'text-amber-600');
          tab.classList.remove('border-transparent', 'text-zinc-500', 'hover:text-zinc-700');
        } else {
          tab.classList.remove('border-amber-500', 'text-amber-600');
          tab.classList.add('border-transparent', 'text-zinc-500', 'hover:text-zinc-700');
        }
      });
      renderList();
    }

    function renderList() {
      const list  = document.getElementById('prayer-list');
      const empty = document.getElementById('empty');
      list.innerHTML = '';

      let filtered = allRequests.filter((r) => !r.isPrivate);
      if (currentFilter === 'active')   filtered = filtered.filter((r) => (r.status || 'active') === 'active');
      if (currentFilter === 'answered') filtered = filtered.filter((r) => r.status === 'answered');
      if (currentFilter === 'mine' && currentUser) {
        filtered = allRequests.filter((r) => r.uid === currentUser.uid);
      }

      if (filtered.length === 0) {
        empty.classList.remove('hidden');
        return;
      }
      empty.classList.add('hidden');

      filtered.forEach((r) => {
        const isAnswered   = r.status === 'answered';
        const hasPrayed    = currentUser && (r.prayedFor || []).includes(currentUser.uid);
        const prayCount    = (r.prayedFor || []).length;
        const isOwn        = currentUser && r.uid === currentUser.uid;
        const authorDisplay = r.isAnonymous ? 'Anonymous' : (r.authorName || 'Member');
        const date = r.submittedAt?.toDate
          ? r.submittedAt.toDate().toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' })
          : '';

        const answeredBadge = isAnswered
          ? '<span class="inline-flex items-center gap-1 bg-green-100 text-green-700 text-xs font-medium px-2.5 py-0.5 rounded-full"><i class="fas fa-check-circle text-xs"></i>Answered</span>'
          : '';

        const testimonyHtml = isAnswered && r.testimony
          ? `<div class="mt-3 p-3 bg-green-50 border border-green-100 rounded-xl text-sm text-green-800">
               <p class="font-medium text-xs text-green-600 mb-1"><i class="fas fa-quote-left mr-1"></i>Testimony</p>
               <p class="whitespace-pre-wrap">${escapeHtml(r.testimony)}</p>
             </div>`
          : '';

        // Controls for the request author
        let ownerControls = '';
        if (isOwn) {
          if (!isAnswered) {
            ownerControls = `
              <button onclick="showTestimonyForm('${r.id}')"
                      class="text-xs text-green-600 hover:text-green-700 font-medium border border-green-200 hover:border-green-300 px-3 py-1.5 rounded-full transition-all">
                <i class="fas fa-check mr-1"></i>Mark as Answered
              </button>`;
          } else {
            ownerControls = `
              <button onclick="setStatus('${r.id}', 'active')"
                      class="text-xs text-zinc-500 hover:text-zinc-700 font-medium border border-zinc-200 px-3 py-1.5 rounded-full transition-all">
                Mark as Active
              </button>`;
          }
        }

        const card = document.createElement('div');
        card.className = `bg-white rounded-2xl border shadow-sm p-6 ${isAnswered ? 'border-green-200' : 'border-zinc-200'}`;
        card.id = 'card-' + r.id;
        card.innerHTML = `
          <div class="flex justify-between items-start gap-4">
            <div class="flex-1 min-w-0">
              <div class="flex flex-wrap gap-2 mb-2">${answeredBadge}</div>
              <p class="text-zinc-700 leading-relaxed whitespace-pre-wrap">${escapeHtml(r.body)}</p>
              ${testimonyHtml}
              <div class="mt-3 flex flex-wrap items-center gap-3 text-xs text-zinc-400">
                <span><i class="fas fa-user mr-1"></i>${escapeHtml(authorDisplay)}</span>
                ${date ? `<span><i class="fas fa-calendar mr-1"></i>${date}</span>` : ''}
                ${r.isPrivate ? '<span class="bg-zinc-100 text-zinc-500 px-2 py-0.5 rounded-full">Private</span>' : ''}
              </div>
            </div>
            ${isOwn ? `<button onclick="deleteRequest('${r.id}')" title="Delete" class="text-zinc-300 hover:text-red-400 transition-colors flex-shrink-0"><i class="fas fa-trash text-sm"></i></button>` : ''}
          </div>

          <!-- Testimony form (hidden until Mark as Answered clicked) -->
          <div id="testimony-form-${r.id}" class="hidden mt-4 space-y-3">
            <textarea id="testimony-text-${r.id}" rows="3"
                      placeholder="Share how God answered this prayer (optional)..."
                      class="w-full border border-zinc-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-green-400 resize-none"></textarea>
            <div class="flex gap-2">
              <button onclick="confirmAnswered('${r.id}')"
                      class="bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded-full text-xs font-medium transition-all">
                <i class="fas fa-check mr-1"></i>Confirm Answered
              </button>
              <button onclick="hideTestimonyForm('${r.id}')"
                      class="border border-zinc-200 text-zinc-500 px-4 py-2 rounded-full text-xs font-medium transition-all">
                Cancel
              </button>
            </div>
          </div>

          <div class="mt-4 flex flex-wrap items-center gap-2">
            <button onclick="togglePray('${r.id}', ${hasPrayed})"
                    class="flex items-center gap-1.5 text-xs font-medium px-3 py-1.5 rounded-full border transition-all ${hasPrayed ? 'bg-purple-50 border-purple-200 text-purple-600' : 'border-zinc-200 text-zinc-500 hover:border-purple-200 hover:text-purple-600'}">
              <i class="fas fa-hands-praying"></i>
              <span>Praying${prayCount > 0 ? ' (' + prayCount + ')' : ''}</span>
            </button>
            ${ownerControls}
          </div>
        `;
        list.appendChild(card);
      });
    }

    function showTestimonyForm(id) {
      document.getElementById('testimony-form-' + id).classList.remove('hidden');
    }

    function hideTestimonyForm(id) {
      document.getElementById('testimony-form-' + id).classList.add('hidden');
    }

    async function confirmAnswered(id) {
      const testimony = document.getElementById('testimony-text-' + id).value.trim();
      await setStatus(id, 'answered', testimony || null);
    }

    async function setStatus(id, status, testimony) {
      try {
        const update = { status };
        if (testimony !== undefined) update.testimony = testimony;
        await db.collection('prayer').doc(id).update(update);
      } catch (err) {
        console.error('Status update failed:', err);
        alert('Failed to update. Please try again.');
      }
    }

    function escapeHtml(str) {
      return String(str || '')
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    async function submitPrayer() {
      if (!currentUser) return;
      const body = document.getElementById('prayer-body').value.trim();
      const msg  = document.getElementById('form-msg');
      if (!body) {
        msg.textContent = 'Please enter your prayer request.';
        msg.className = 'text-sm font-medium text-red-500';
        msg.classList.remove('hidden');
        return;
      }

      const isAnonymous = document.getElementById('is-anonymous').checked;
      const isPrivate   = document.getElementById('is-private').checked;

      try {
        await db.collection('prayer').add({
          uid: currentUser.uid,
          authorName: isAnonymous ? null : (currentUser.displayName || currentUser.email),
          body,
          isAnonymous,
          isPrivate,
          status: 'active',
          testimony: null,
          prayedFor: [],
          submittedAt: firebase.firestore.FieldValue.serverTimestamp(),
        });
        document.getElementById('prayer-body').value = '';
        document.getElementById('is-anonymous').checked = false;
        document.getElementById('is-private').checked  = false;
        msg.textContent = 'Prayer request submitted. Thank you.';
        msg.className = 'text-sm font-medium text-green-600';
        msg.classList.remove('hidden');
        setTimeout(() => toggleForm(), 1500);
      } catch (err) {
        console.error('Submit failed:', err);
        msg.textContent = 'Failed to submit. Please try again.';
        msg.className = 'text-sm font-medium text-red-500';
        msg.classList.remove('hidden');
      }
    }

    async function togglePray(id, hasPrayed) {
      if (!currentUser) return;
      const op = hasPrayed
        ? firebase.firestore.FieldValue.arrayRemove(currentUser.uid)
        : firebase.firestore.FieldValue.arrayUnion(currentUser.uid);
      try {
        await db.collection('prayer').doc(id).update({ prayedFor: op });
      } catch (err) {
        console.error('Pray toggle failed:', err);
      }
    }

    async function deleteRequest(id) {
      if (!confirm('Delete this prayer request?')) return;
      try {
        await db.collection('prayer').doc(id).delete();
      } catch (err) {
        console.error('Delete failed:', err);
        alert('Failed to delete. Please try again.');
      }
    }

    function loadPrayer() {
      db.collection('prayer')
        .orderBy('submittedAt', 'desc')
        .onSnapshot((snap) => {
          document.getElementById('loading').classList.add('hidden');
          allRequests = snap.docs.map((d) => ({ id: d.id, ...d.data() }));
          renderList();
        }, (err) => {
          console.error('Prayer load failed:', err);
          document.getElementById('loading').innerHTML =
            '<p class="text-red-500">Failed to load prayer requests.</p>';
        });
    }

    document.addEventListener('nav-loaded', loadPrayer);
  </script>
</body>
</html>
