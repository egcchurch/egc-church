<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0A3D62">
  <title>Cottage Meetings | EGC</title>

  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-functions-compat.js"></script>
</head>
<body class="bg-zinc-50 font-sans overflow-x-hidden">

  <div id="nav-placeholder"></div>

  <!-- PAGE HEADER -->
  <div class="bg-[#0A3D62] text-white py-10 px-6">
    <div class="max-w-5xl mx-auto">
      <h1 class="text-3xl font-bold tracking-tight">Cottage Meetings</h1>
      <p class="text-blue-200 mt-1">Register for the cottage meeting in your area. Seats are limited.</p>
    </div>
  </div>

  <main class="max-w-5xl mx-auto px-6 py-8">
    <div id="loading" class="text-center py-16 text-zinc-400">
      <i class="fas fa-spinner fa-spin text-3xl mb-3"></i>
      <p>Loading cottage meetings...</p>
    </div>

    <div id="empty" class="hidden text-center py-16 text-zinc-400">
      <i class="fas fa-house-chimney text-5xl mb-4 opacity-30"></i>
      <p class="text-lg font-medium">No cottage meetings open right now</p>
      <p class="text-sm mt-1">Check back when registration opens for the next round.</p>
    </div>

    <div id="regions"></div>
  </main>

  <!-- TOAST -->
  <div id="toast" class="fixed bottom-6 right-6 z-50 hidden px-6 py-3 rounded-2xl text-white text-sm font-medium shadow-lg"></div>

  <script src="/firebase-config.js"></script>
  <script src="/js/nav.js"></script>
  <script src="/js/main.js"></script>
  <script src="/js/member-auth.js"></script>
  <script>
    const db = firebase.firestore();
    const fns = firebase.functions();

    let currentUser = null;
    let regionsList = [];     // [{id, name}]
    let meetings = [];        // open meetings
    let myReg = null;         // { meetingId, partySize, ... } or null
    let myPhone = '';         // prefill for the SMS confirmation field

    function showToast(msg, type) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'fixed bottom-6 right-6 z-50 px-6 py-3 rounded-2xl text-white text-sm font-medium shadow-lg '
        + (type === 'error' ? 'bg-red-600' : 'bg-green-600');
      t.classList.remove('hidden');
      setTimeout(() => t.classList.add('hidden'), 4000);
    }

    function escHtml(str) {
      return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // Only allow real http(s) links (block javascript: etc.); tel sanitised to digits.
    function safeHttpUrl(url) {
      const u = String(url || '').trim();
      return /^https?:\/\//i.test(u) ? u : '';
    }
    function telHref(num) {
      return 'tel:' + String(num || '').replace(/[^0-9+]/g, '');
    }

    function seatsLeft(m) {
      const cap = m.capacity || 0;
      return Math.max(cap - (m.seatsTaken || 0), 0);
    }

    function regionName(id) {
      const r = regionsList.find(x => x.id === id);
      return r ? r.name : 'Other';
    }

    firebase.auth().onAuthStateChanged((user) => {
      if (!user) return; // member-auth.js handles the access-denied overlay
      currentUser = user;
      loadAll();
    });

    async function loadAll() {
      try {
        const [regionsSnap, meetingsSnap, regSnap, userSnap] = await Promise.all([
          db.doc('config/cottageRegions').get(),
          db.collection('cottageMeetings').where('open', '==', true).get(),
          db.collection('cottageRegistrations').doc(currentUser.uid).get(),
          db.collection('users').doc(currentUser.uid).get(),
        ]);

        regionsList = (regionsSnap.exists && Array.isArray(regionsSnap.data().regions))
          ? regionsSnap.data().regions : [];
        meetings = meetingsSnap.docs.map(d => ({ id: d.id, ...d.data() }));
        myReg = regSnap.exists ? regSnap.data() : null;
        myPhone = (userSnap.exists && userSnap.data().phone) ? userSnap.data().phone : '';

        render();
      } catch (err) {
        console.error('Failed to load cottage meetings:', err);
        document.getElementById('loading').innerHTML = '<p class="text-red-500">Failed to load. Please try again.</p>';
      }
    }

    function render() {
      document.getElementById('loading').classList.add('hidden');
      const wrap = document.getElementById('regions');
      const empty = document.getElementById('empty');
      wrap.innerHTML = '';

      // Show only today/future meetings, sorted by date.
      const today = new Date().toISOString().slice(0, 10);
      const visible = meetings
        .filter(m => !m.date || m.date >= today)
        .sort((a, b) => (a.date || '').localeCompare(b.date || ''));

      if (!visible.length) { empty.classList.remove('hidden'); return; }
      empty.classList.add('hidden');

      // Group by region (in the configured region order, then any leftovers).
      const order = regionsList.map(r => r.id);
      const groups = {};
      visible.forEach(m => { (groups[m.regionId] = groups[m.regionId] || []).push(m); });
      const groupIds = Object.keys(groups).sort((a, b) => {
        const ia = order.indexOf(a), ib = order.indexOf(b);
        return (ia === -1 ? 999 : ia) - (ib === -1 ? 999 : ib);
      });

      groupIds.forEach(rid => {
        const section = document.createElement('div');
        section.className = 'mb-8';
        section.innerHTML = `<h2 class="text-lg font-bold text-[#0A3D62] mb-3">${escHtml(regionName(rid))}</h2>`;
        const grid = document.createElement('div');
        grid.className = 'grid grid-cols-1 md:grid-cols-2 gap-4';
        groups[rid].forEach(m => grid.appendChild(buildCard(m)));
        section.appendChild(grid);
        wrap.appendChild(section);
      });
    }

    function buildCard(m) {
      const left = seatsLeft(m);
      const full = left <= 0;
      const mineHere = myReg && myReg.meetingId === m.id;
      const mineElsewhere = myReg && myReg.meetingId !== m.id;
      const when = [m.date, m.time].filter(Boolean).join(' · ');
      const maps = safeHttpUrl(m.mapsLink);

      const card = document.createElement('div');
      card.className = 'bg-white rounded-2xl border border-gray-100 shadow-sm p-5 ' + (mineHere ? 'ring-2 ring-amber-400' : '');

      let action;
      if (mineHere) {
        action = `
          <div class="mt-4 flex items-center justify-between gap-3">
            <span class="text-sm text-green-700 font-medium"><i class="fas fa-circle-check mr-1"></i>You're registered (party of ${myReg.partySize})</span>
            <button data-cancel class="text-sm border border-red-200 text-red-600 hover:bg-red-50 px-4 py-2 rounded-full transition">Cancel</button>
          </div>`;
      } else if (mineElsewhere) {
        action = `<p class="mt-4 text-xs text-zinc-400">You're registered for ${escHtml(regionName(myReg.regionId))}. Cancel that to switch.</p>`;
      } else if (full) {
        action = `<p class="mt-4 text-sm text-red-500 font-medium">Fully booked</p>`;
      } else {
        const hasPhone = !!myPhone;
        action = `
          <div class="mt-4 space-y-3">
            <div class="flex items-center gap-2">
              <label class="text-sm text-gray-600 whitespace-nowrap">Number attending</label>
              <input type="number" data-party min="1" max="${left}" value="1"
                     class="w-16 border border-gray-200 rounded-lg px-2 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400">
            </div>
            <label class="flex items-start gap-2 text-sm text-gray-600 cursor-pointer">
              <input type="checkbox" data-sms class="mt-0.5 w-4 h-4 accent-amber-500">
              <span>Send me an SMS confirmation${hasPhone ? ` to <span class="font-medium">${escHtml(myPhone)}</span>` : ''}</span>
            </label>
            ${hasPhone
              ? `<p class="text-xs text-zinc-400">To use a different number, update it in your <a href="/profile.html" class="text-blue-600 hover:underline">profile</a>.</p>`
              : `<input type="tel" data-phone placeholder="Mobile number for SMS (saved to your profile)"
                        class="hidden w-full border border-gray-200 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400">`}
            <button data-register class="w-full bg-amber-500 hover:bg-amber-600 text-white text-sm px-5 py-2 rounded-full transition">Register</button>
          </div>`;
      }

      card.innerHTML = `
        <div class="flex items-start justify-between gap-3">
          <div class="min-w-0">
            ${m.title ? `<p class="font-bold text-[#0A3D62] mb-0.5">${escHtml(m.title)}</p>` : ''}
            <p class="font-semibold text-gray-900 whitespace-pre-line"><i class="fas fa-location-dot text-amber-500 mr-1"></i>${escHtml(m.address || 'Venue to be confirmed')}</p>
            ${maps ? `<a href="${escHtml(maps)}" target="_blank" rel="noopener" class="inline-flex items-center gap-1 text-sm text-blue-600 hover:underline mt-1"><i class="fas fa-map-location-dot"></i>Get directions</a>` : ''}
            ${when ? `<p class="text-sm text-gray-500 mt-1"><i class="fas fa-calendar mr-1"></i>${escHtml(when)}</p>` : ''}
            ${(m.contactName || m.contactNumber) ? `<p class="text-sm text-gray-500 mt-1"><i class="fas fa-user mr-1"></i>${escHtml(m.contactName || 'Contact')}${m.contactNumber ? `: <a href="${escHtml(telHref(m.contactNumber))}" class="text-blue-600 hover:underline">${escHtml(m.contactNumber)}</a>` : ''}</p>` : ''}
            ${m.notes ? `<p class="text-sm text-gray-500 mt-1">${escHtml(m.notes)}</p>` : ''}
          </div>
          <span class="text-xs whitespace-nowrap px-2.5 py-1 rounded-full ${full ? 'bg-red-100 text-red-600' : 'bg-green-100 text-green-700'}">${left} of ${m.capacity || 0} left</span>
        </div>
        ${action}`;

      const smsBox = card.querySelector('[data-sms]');
      const phoneInput = card.querySelector('[data-phone]'); // only rendered when no profile number
      if (smsBox && phoneInput) {
        smsBox.addEventListener('change', () => {
          phoneInput.classList.toggle('hidden', !smsBox.checked);
          if (smsBox.checked) phoneInput.focus();
        });
      }
      const regBtn = card.querySelector('[data-register]');
      if (regBtn) {
        regBtn.addEventListener('click', () => {
          const party = parseInt(card.querySelector('[data-party]').value, 10) || 1;
          const sms = !!(smsBox && smsBox.checked);
          const phone = phoneInput ? (phoneInput.value || '').trim() : '';
          if (sms && !myPhone && !phone) {
            showToast('Enter a mobile number to receive an SMS.', 'error');
            if (phoneInput) phoneInput.focus();
            return;
          }
          register(m.id, party, { sms, phone }, regBtn);
        });
      }
      const cancelBtn = card.querySelector('[data-cancel]');
      if (cancelBtn) cancelBtn.addEventListener('click', () => cancelRegistration(cancelBtn));

      return card;
    }

    async function register(meetingId, partySize, opts, btn) {
      btn.disabled = true; btn.textContent = 'Registering...';
      try {
        await fns.httpsCallable('registerForCottageMeeting')({ meetingId, partySize, sms: opts.sms, phone: opts.phone });
        showToast('Registered! Check your notifications for the details.', 'success');
        await loadAll();
      } catch (err) {
        console.error(err);
        showToast(err.message || 'Could not register. Please try again.', 'error');
        btn.disabled = false; btn.textContent = 'Register';
      }
    }

    async function cancelRegistration(btn) {
      if (!confirm('Cancel your cottage meeting registration?')) return;
      btn.disabled = true; btn.textContent = 'Cancelling...';
      try {
        await fns.httpsCallable('cancelCottageRegistration')({});
        showToast('Registration cancelled.', 'success');
        await loadAll();
      } catch (err) {
        console.error(err);
        showToast(err.message || 'Could not cancel. Please try again.', 'error');
        btn.disabled = false; btn.textContent = 'Cancel';
      }
    }
  </script>
</body>
</html>
