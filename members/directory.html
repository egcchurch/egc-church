<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0A3D62">
  <title>Member Directory | Emmanuel Gospel Centre</title>

  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="/firebase-config.js"></script>
  <script src="/js/member-auth.js"></script>
</head>
<body class="bg-zinc-50 font-sans">

  <div id="nav-placeholder" class="contents"></div>

  <!-- PAGE HEADER -->
  <div class="bg-[#0A3D62] text-white py-10 px-6">
    <div class="max-w-7xl mx-auto">
      <h1 class="text-3xl font-bold tracking-tight">Member Directory</h1>
      <p class="text-blue-200 mt-1">Connect with fellow members of Emmanuel Gospel Centre</p>
    </div>
  </div>

  <!-- SEARCH -->
  <div class="bg-white border-b px-6 py-4">
    <div class="max-w-7xl mx-auto">
      <div class="relative max-w-md">
        <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-zinc-400"></i>
        <input id="search-input" type="text" placeholder="Search by name..."
               class="w-full pl-10 pr-4 py-2.5 border border-zinc-200 rounded-full text-sm focus:outline-none focus:ring-2 focus:ring-amber-400">
      </div>
    </div>
  </div>

  <!-- DIRECTORY LIST -->
  <main class="max-w-7xl mx-auto px-6 py-8">
    <div id="loading" class="text-center py-16 text-zinc-400">
      <i class="fas fa-spinner fa-spin text-3xl mb-3"></i>
      <p>Loading directory...</p>
    </div>
    <div id="empty" class="hidden text-center py-16 text-zinc-400">
      <i class="fas fa-address-book text-5xl mb-4 opacity-30"></i>
      <p class="text-lg font-medium">No members found</p>
    </div>
    <div id="member-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4"></div>
  </main>

  <!-- MEMBER CARD TEMPLATE (cloned by JS) -->
  <template id="card-tpl">
    <div class="bg-white rounded-2xl border border-zinc-200 shadow-sm p-5 flex flex-col items-center text-center gap-2">
      <img class="w-20 h-20 rounded-full object-cover bg-zinc-200" src="" alt="">
      <h3 class="font-semibold text-[#0A3D62] text-base leading-tight"></h3>
      <span class="text-xs text-zinc-400 uppercase tracking-wider font-medium"></span>
      <div class="contact-links flex flex-col gap-1 mt-1 w-full"></div>
    </div>
  </template>

  <script src="/js/nav.js"></script>
  <script src="/js/main.js"></script>
  <script>
    const db = firebase.firestore();
    let allMembers = [];

    function renderMembers(list) {
      const grid = document.getElementById('member-grid');
      const empty = document.getElementById('empty');
      grid.innerHTML = '';

      if (list.length === 0) {
        empty.classList.remove('hidden');
        return;
      }
      empty.classList.add('hidden');

      const tpl = document.getElementById('card-tpl');
      list.forEach((m) => {
        const card = tpl.content.cloneNode(true);
        const img = card.querySelector('img');
        img.src = m.photoURL || '/assets/images/icons/icon-192.png';
        img.alt = m.displayName || 'Member';
        card.querySelector('h3').textContent = m.displayName || 'Member';
        card.querySelector('span').textContent = m.membership === 'member' ? 'Member' : '';

        const links = card.querySelector('.contact-links');
        if (m.directoryShowEmail && m.email) {
          const a = document.createElement('a');
          a.href = `mailto:${m.email}`;
          a.className = 'text-xs text-amber-600 hover:underline truncate';
          a.textContent = m.email;
          links.appendChild(a);
        }
        if (m.directoryShowPhone && m.phone) {
          const a = document.createElement('a');
          a.href = `tel:${m.phone}`;
          a.className = 'text-xs text-zinc-500 hover:underline';
          a.textContent = m.phone;
          links.appendChild(a);
        }

        grid.appendChild(card);
      });
    }

    function applySearch(query) {
      const q = query.toLowerCase().trim();
      if (!q) {
        renderMembers(allMembers);
        return;
      }
      renderMembers(allMembers.filter((m) =>
        (m.displayName || '').toLowerCase().includes(q)
      ));
    }

    function loadDirectory() {
      db.collection('users')
        .where('membership', '==', 'member')
        .where('directoryVisible', '==', true)
        .get()
        .then((snap) => {
          document.getElementById('loading').classList.add('hidden');
          allMembers = snap.docs
            .map((d) => d.data())
            .sort((a, b) => (a.displayName || '').localeCompare(b.displayName || ''));
          renderMembers(allMembers);
        })
        .catch((err) => {
          console.error('Directory load failed:', err);
          document.getElementById('loading').innerHTML =
            '<p class="text-red-500">Failed to load directory.</p>';
        });
    }

    document.getElementById('search-input').addEventListener('input', (e) => {
      applySearch(e.target.value);
    });

    document.addEventListener('nav-loaded', loadDirectory);
  </script>
</body>
</html>
