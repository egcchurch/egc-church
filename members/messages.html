<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0A3D62">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="EGC">
  <link rel="apple-touch-icon" href="/assets/images/icons/icon-192.png">
  <title>Messages | Emmanuel Gospel Centre</title>

  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
  <link rel="stylesheet" href="/assets/css/tailwind.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="/firebase-config.js"></script>
  <script src="/js/member-auth.js"></script>

  <style>
    /* Mobile two-panel swap — plain CSS, no Tailwind dependency */
    @media (max-width: 767px) {
      #thread-wrapper { display: none !important; }
      #thread-wrapper.mobile-active { display: flex !important; flex-direction: column; flex: 1 1 0%; min-width: 0; }
      #conv-panel.mobile-hidden { display: none !important; }
    }
  </style>
</head>
<body class="bg-zinc-50 font-sans" data-feature-gate="messaging">

  <!-- Navigation -->
  <div id="nav-placeholder" class="contents"></div>

  <!-- PAGE HEADER -->
  <div class="bg-[#0A3D62] text-white py-10 px-6">
    <div class="max-w-7xl mx-auto flex items-center justify-between flex-wrap gap-4">
      <div>
        <h1 class="text-3xl font-bold tracking-tight">Messages</h1>
        <p class="text-blue-200 mt-1">Group and team conversations</p>
      </div>
    </div>
  </div>

  <!-- MESSAGING UI -->
  <main class="max-w-7xl mx-auto px-4 py-6">
    <div class="bg-white rounded-2xl border border-zinc-200 shadow-sm overflow-hidden flex" style="height: calc(100vh - 260px); min-height: 480px;">

      <!-- ── Conversation List ───────────────────────────────────────────── -->
      <div id="conv-panel" class="w-full md:w-72 lg:w-80 border-r border-zinc-100 flex flex-col shrink-0">
        <div class="px-4 py-3 border-b border-zinc-100">
          <p class="text-xs font-semibold text-gray-400 uppercase tracking-wide">Conversations</p>
        </div>
        <div id="conv-list" class="flex-1 overflow-y-auto">
          <div class="flex items-center justify-center h-full text-gray-300">
            <i class="fas fa-circle-notch fa-spin text-2xl"></i>
          </div>
        </div>
      </div>

      <!-- ── Message Thread ──────────────────────────────────────────────── -->
      <div id="thread-wrapper" class="flex-1 flex flex-col min-w-0">

        <!-- Empty state (no conversation selected) -->
        <div id="empty-state" class="flex-1 flex flex-col items-center justify-center gap-3 text-gray-300 p-8">
          <i class="fas fa-comments text-5xl"></i>
          <p class="text-sm text-gray-400">Select a conversation from the list</p>
        </div>

        <!-- Thread panel (hidden until conversation selected) -->
        <div id="thread-panel" class="hidden flex-1 flex flex-col min-h-0">

          <!-- Mobile back button -->
          <div class="md:hidden flex items-center gap-3 px-4 py-3 border-b border-zinc-100 shrink-0">
            <button id="back-to-list" class="text-[#0A3D62] hover:text-amber-600 transition-colors">
              <i class="fas fa-arrow-left text-lg"></i>
            </button>
            <p id="thread-title" class="text-sm font-semibold text-gray-700 truncate"></p>
          </div>

          <!-- Message feed -->
          <div id="msg-feed"
               class="flex-1 overflow-y-auto px-5 py-4 flex flex-col justify-end min-h-0">
          </div>

          <!-- Send form -->
          <div class="border-t border-zinc-100 px-4 py-3 bg-white">
            <form id="send-form" class="flex gap-2 items-end">
              <textarea id="msg-input"
                        rows="1"
                        placeholder="Type a message…"
                        maxlength="2000"
                        class="flex-1 border border-zinc-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400 resize-none"
                        onInput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px'"></textarea>
              <button type="submit"
                      class="bg-amber-500 hover:bg-amber-600 text-white px-4 py-2.5 rounded-xl text-sm font-semibold transition-colors shrink-0">
                <i class="fas fa-paper-plane"></i>
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <p class="text-xs text-gray-400 mt-3 text-center">
      Messages are only visible to participants. Treat others with kindness and respect.
    </p>
  </main>


  <script src="/js/nav.js"></script>
  <script src="/js/main.js"></script>
  <script src="/js/messaging.js"></script>
</body>
</html>
