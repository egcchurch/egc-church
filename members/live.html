<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0A3D62">
  <title>Live Stream | Emmanuel Gospel Centre</title>

  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
  <link rel="stylesheet" href="/assets/css/tailwind.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="/firebase-config.js"></script>
  <script src="/js/member-auth.js"></script>
</head>
<body class="bg-zinc-900 font-sans min-h-screen" data-feature-gate="liveStream">

  <div id="nav-placeholder" class="contents"></div>

  <!-- LIVE STREAM EMBED -->
  <main class="max-w-5xl mx-auto px-4 py-8">

    <!-- Status banner -->
    <div id="live-banner" class="hidden mb-4 flex items-center gap-2 bg-red-600 text-white px-4 py-2 rounded-full w-fit text-sm font-medium">
      <span class="w-2 h-2 bg-white rounded-full animate-pulse"></span>
      LIVE NOW
    </div>

    <!-- Player -->
    <div class="aspect-video w-full bg-black rounded-2xl overflow-hidden shadow-2xl">
      <div id="stream-placeholder" class="w-full h-full flex flex-col items-center justify-center text-white/40">
        <i class="fas fa-circle-play text-6xl mb-4"></i>
        <p class="text-lg font-medium">No live stream scheduled</p>
        <p class="text-sm mt-1">Join us in person or check back before service time</p>
      </div>
      <iframe id="stream-iframe" class="hidden w-full h-full" src="" frameborder="0"
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
              allowfullscreen></iframe>
    </div>

    <!-- Service info -->
    <div class="mt-6 text-white/80">
      <h1 id="stream-title" class="text-2xl font-bold text-white"></h1>
      <p id="stream-desc" class="mt-1 text-sm leading-relaxed"></p>
    </div>

    <!-- Service times -->
    <div class="mt-8 bg-zinc-800 rounded-2xl p-6">
      <h2 class="text-white font-semibold mb-4">Service Times</h2>
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 text-sm text-white/70">
        <div class="flex items-start gap-3">
          <i class="fas fa-sun text-amber-400 mt-0.5"></i>
          <div>
            <p class="font-medium text-white">Sunday Morning Service</p>
            <p>10:00 AM — 12:00 PM</p>
          </div>
        </div>
        <div class="flex items-start gap-3">
          <i class="fas fa-moon text-amber-400 mt-0.5"></i>
          <div>
            <p class="font-medium text-white">Wednesday Bible Study</p>
            <p>7:00 PM — 9:00 PM</p>
          </div>
        </div>
      </div>
    </div>

  </main>

  <script src="/js/nav.js"></script>
  <script src="/js/main.js"></script>
  <script>
    const db = firebase.firestore();

    function loadLiveStream() {
      // Check Firestore for an active stream config
      // Admins can store a live stream doc at /config/liveStream with:
      //   { youtubeId: "...", title: "...", description: "...", isLive: true }
      db.collection('config').doc('liveStream').get()
        .then((doc) => {
          if (!doc.exists || !doc.data().youtubeId) return;
          const data = doc.data();

          if (data.isLive) {
            document.getElementById('live-banner').classList.remove('hidden');
          }

          if (data.title) {
            document.getElementById('stream-title').textContent = data.title;
          }
          if (data.description) {
            document.getElementById('stream-desc').textContent = data.description;
          }

          const iframe = document.getElementById('stream-iframe');
          iframe.src = `https://www.youtube.com/embed/${data.youtubeId}?autoplay=0&rel=0`;
          iframe.classList.remove('hidden');
          document.getElementById('stream-placeholder').classList.add('hidden');
        })
        .catch(() => {
          // No config or permission error — show placeholder
        });
    }

    document.addEventListener('nav-loaded', loadLiveStream);
  </script>
</body>
</html>
