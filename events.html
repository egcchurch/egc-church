<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0A3D62">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="EGC">
  <link rel="apple-touch-icon" href="assets/images/icons/icon-192.png">
  <title>Notices | Emmanuel Gospel Centre</title>

  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
  <link rel="stylesheet" href="/assets/css/tailwind.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-functions-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>

  <style>
    .category-btn.active {
      background-color: #0A3D62;
      color: white;
      box-shadow: 0 2px 4px rgba(10,61,98,0.2);
    }
  </style>
</head>
<body class="bg-zinc-50 font-sans">

  <!-- Navigation -->
  <div id="nav-placeholder" class="contents"></div>

  <!-- Header -->
  <header data-hero-banner class="relative -mt-16 pt-32 pb-16 bg-[#0A3D62] text-white">
    <div class="max-w-7xl mx-auto px-6 text-center">
      <h1 class="text-5xl font-bold mb-4">Notices</h1>
      <p class="text-amber-200 max-w-lg mx-auto">Current and upcoming events for the congregation</p>
    </div>
  </header>

  <!-- Loading state -->
  <div id="loading" class="text-center py-16 text-gray-400">
    <i class="fas fa-spinner fa-spin text-3xl mb-3 block"></i>
    Loading...
  </div>

  <!-- Error state -->
  <div id="error-msg" class="hidden text-center py-16 text-red-400">
    <i class="fas fa-exclamation-circle text-3xl mb-3 block"></i>
    Failed to load notices. Please try again later.
  </div>

  <!-- Main content -->
  <div id="content" class="hidden">

    <!-- Category filter -->
    <div class="max-w-7xl mx-auto px-6 pt-8 pb-4">
      <div class="flex flex-wrap gap-3">
        <button onclick="setCategory('all')" id="filter-all"
                class="category-btn active px-5 py-2.5 rounded-3xl border border-gray-200 bg-white font-medium text-sm transition hover:border-[#0A3D62]">
          All
        </button>
        <button onclick="setCategory('service')" id="filter-service"
                class="category-btn px-5 py-2.5 rounded-3xl border border-gray-200 bg-white font-medium text-sm transition hover:border-[#0A3D62]">
          <i class="fas fa-church mr-1"></i> Services
        </button>
        <button onclick="setCategory('group')" id="filter-group"
                class="category-btn px-5 py-2.5 rounded-3xl border border-gray-200 bg-white font-medium text-sm transition hover:border-[#0A3D62]">
          <i class="fas fa-users mr-1"></i> Groups
        </button>
        <button onclick="setCategory('special')" id="filter-special"
                class="category-btn px-5 py-2.5 rounded-3xl border border-gray-200 bg-white font-medium text-sm transition hover:border-[#0A3D62]">
          <i class="fas fa-star mr-1"></i> Special
        </button>
        <button onclick="setCategory('other')" id="filter-other"
                class="category-btn px-5 py-2.5 rounded-3xl border border-gray-200 bg-white font-medium text-sm transition hover:border-[#0A3D62]">
          <i class="fas fa-calendar mr-1"></i> Other
        </button>
      </div>
    </div>

    <div class="max-w-3xl mx-auto px-4 sm:px-6 pb-16">

      <!-- Month navigation -->
      <div class="flex items-center justify-between mb-4 mt-2">
        <button onclick="prevMonth()"
                class="w-10 h-10 rounded-full border border-zinc-200 bg-white flex items-center justify-center text-[#0A3D62] hover:border-[#0A3D62] transition-colors shadow-sm">
          <i class="fas fa-chevron-left text-sm"></i>
        </button>
        <div class="flex items-center gap-3">
          <h2 id="month-label" class="text-xl font-bold text-[#0A3D62]"></h2>
          <button id="today-btn" onclick="goToToday()"
                  class="hidden text-xs font-medium px-3 py-1 rounded-full border border-amber-300 text-amber-600 hover:bg-amber-50 transition-colors">
            Today
          </button>
        </div>
        <button onclick="nextMonth()"
                class="w-10 h-10 rounded-full border border-zinc-200 bg-white flex items-center justify-center text-[#0A3D62] hover:border-[#0A3D62] transition-colors shadow-sm">
          <i class="fas fa-chevron-right text-sm"></i>
        </button>
      </div>

      <!-- Calendar -->
      <div class="bg-white rounded-2xl border border-zinc-200 shadow-sm overflow-hidden">

        <!-- Day of week headers -->
        <div style="display:grid;grid-template-columns:repeat(7,minmax(0,1fr));border-bottom:1px solid #f4f4f5;background:#fafafa;">
          <div style="text-align:center;font-size:11px;font-weight:600;color:#a1a1aa;padding:10px 0">Su</div>
          <div style="text-align:center;font-size:11px;font-weight:600;color:#a1a1aa;padding:10px 0">Mo</div>
          <div style="text-align:center;font-size:11px;font-weight:600;color:#a1a1aa;padding:10px 0">Tu</div>
          <div style="text-align:center;font-size:11px;font-weight:600;color:#a1a1aa;padding:10px 0">We</div>
          <div style="text-align:center;font-size:11px;font-weight:600;color:#a1a1aa;padding:10px 0">Th</div>
          <div style="text-align:center;font-size:11px;font-weight:600;color:#a1a1aa;padding:10px 0">Fr</div>
          <div style="text-align:center;font-size:11px;font-weight:600;color:#a1a1aa;padding:10px 0">Sa</div>
        </div>

        <!-- Grid — filled by JS -->
        <div id="cal-grid" style="display:grid;grid-template-columns:repeat(7,minmax(0,1fr))"></div>

      </div>

      <!-- Legend -->
      <div style="display:flex;flex-wrap:wrap;align-items:center;gap:6px 16px;margin-top:12px;padding:0 4px;">
        <span style="display:flex;align-items:center;gap:6px;font-size:12px;color:#a1a1aa;">
          <span style="width:10px;height:10px;border-radius:9999px;background:#3B82F6;display:inline-block;flex-shrink:0;"></span>Service
        </span>
        <span style="display:flex;align-items:center;gap:6px;font-size:12px;color:#a1a1aa;">
          <span style="width:10px;height:10px;border-radius:9999px;background:#22C55E;display:inline-block;flex-shrink:0;"></span>Group
        </span>
        <span style="display:flex;align-items:center;gap:6px;font-size:12px;color:#a1a1aa;">
          <span style="width:10px;height:10px;border-radius:9999px;background:#F59E0B;display:inline-block;flex-shrink:0;"></span>Special
        </span>
        <span style="display:flex;align-items:center;gap:6px;font-size:12px;color:#a1a1aa;">
          <span style="width:10px;height:10px;border-radius:9999px;background:#9CA3AF;display:inline-block;flex-shrink:0;"></span>Other
        </span>
        <span style="margin-left:auto;font-size:12px;color:#a1a1aa;">Tap a date to see details</span>
      </div>

      <!-- Day detail panel -->
      <div id="day-panel" class="hidden mt-6">
        <div class="flex items-center gap-3 mb-4 px-1">
          <span class="w-2 h-2 rounded-full bg-amber-500 shrink-0" style="box-shadow:0 0 0 4px rgba(245,158,11,0.15)"></span>
          <h3 id="day-panel-title" class="text-lg font-bold text-[#0A3D62]"></h3>
        </div>
        <div id="day-events" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1rem;"></div>
      </div>

      <!-- Empty state -->
      <div id="empty-state" class="hidden text-center py-16 text-gray-400">
        <i class="fas fa-calendar-xmark text-4xl mb-4 block text-gray-300"></i>
        <p class="text-lg font-medium text-gray-500 mb-2">Nothing on this month</p>
        <p class="text-sm">Try navigating to another month or check back soon.</p>
      </div>

    </div>
  </div>

  <!-- REGISTRATION MODAL — dynamic fields per event (Event Registration Phase B1,
       see docs/EVENT_REGISTRATION.md). Content is rendered by js/event-registration.js. -->
  <div id="registration-modal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-6 max-h-[90vh] overflow-y-auto">
      <div class="flex justify-between items-center mb-1">
        <h3 class="text-lg font-bold text-[#0A3D62]" id="registration-modal-title">Register</h3>
        <button onclick="closeRegistrationModal()" class="text-zinc-400 hover:text-zinc-600"><i class="fas fa-times text-xl"></i></button>
      </div>
      <div id="registration-modal-body"></div>
    </div>
  </div>

  <div id="footer-placeholder"></div>

  <script src="firebase-config.js"></script>
  <script src="/js/nav.js"></script>
  <script src="js/main.js"></script>
  <script src="js/storage-upload.js"></script>
  <script src="js/events.js"></script>
  <script src="js/event-registration.js"></script>
</body>
</html>
