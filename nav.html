<!-- Shared public navigation. Injected by js/nav.js into #nav-placeholder. -->
<!-- To add or rename a top-level link, edit it here once. -->
<!-- Default is solid navy (always safe to render on its own). On pages with a
     [data-hero-banner] element right below it, js/nav.js (initHeroOverlay) makes
     this transparent while scrolled within that banner, then solid again past it
     — see nav.js for the scroll logic. -->
<nav class="bg-[#0A3D62] border-b border-white/10 sticky top-0 z-50 transition-colors duration-300">
  <div class="max-w-7xl mx-auto px-6">
    <div class="flex justify-between items-center h-16 gap-2">
      <!-- Links are split either side of the logo and laid out in normal flex
           flow (no absolute positioning) so the logo can never visually
           overlap them, regardless of viewport width or font metrics — an
           absolutely-centered logo over a single wide link group did exactly
           that in practice. Hidden below lg: (1024px) — at narrower desktop
           widths there isn't reliably enough room for both link groups plus
           the logo plus the icons/login button without the same risk. -->
      <div class="hidden lg:flex items-center gap-x-5 text-sm font-medium text-white/90 flex-1 justify-end min-w-0">
        <a href="/index.html" class="hover:text-amber-400 transition-colors whitespace-nowrap">HOME</a>
        <a href="/sermons.html" class="hover:text-amber-400 transition-colors whitespace-nowrap">SERMONS</a>
        <a href="/events.html" class="hover:text-amber-400 transition-colors whitespace-nowrap">EVENTS</a>
        <a href="/blog.html" class="hover:text-amber-400 transition-colors whitespace-nowrap">BLOG</a>
        <a href="/about.html" class="hover:text-amber-400 transition-colors whitespace-nowrap">ABOUT</a>
      </div>

      <!-- Logo — #nav-logo-area is also the hook applyBranding() (js/main.js)
           replaces with a superadmin-uploaded custom logo, if one is set.
           logo.png already has the "EMMANUEL / GOSPEL CENTRE" wordmark baked
           into the image, so no separate text is added here. -->
      <a href="/index.html" class="shrink-0 px-2">
        <div id="nav-logo-area" class="flex items-center">
          <img src="/assets/images/logo.png" alt="Emmanuel Gospel Centre" class="h-12 w-auto">
        </div>
      </a>

      <div class="hidden lg:flex items-center gap-x-5 text-sm font-medium text-white/90 flex-1 min-w-0">
        <a href="/william-branham.html" class="hover:text-amber-400 transition-colors whitespace-nowrap">WILLIAM BRANHAM</a>
        <a href="/gallery.html" data-feature="gallery" class="hover:text-amber-400 transition-colors whitespace-nowrap">GALLERY</a>
        <a href="/music.html" data-feature="music" class="hover:text-amber-400 transition-colors whitespace-nowrap">MUSIC</a>
        <a href="/connect.html" class="hover:text-amber-400 transition-colors whitespace-nowrap">CONNECT</a>
      </div>

      <div class="flex items-center gap-1 shrink-0">
        <!-- Search trigger -->
        <button onclick="openSearch()" title="Search (/ or Ctrl+K)"
                class="p-2 text-white/70 hover:text-amber-400 transition-colors">
          <i class="fas fa-magnifying-glass text-lg"></i>
        </button>

        <!-- Notification bell (shown when signed in by notifications.js) -->
        <div id="notif-bell-wrapper" class="hidden relative">
          <button id="notif-bell-btn"
                  class="relative p-2 text-white/70 hover:text-amber-400 transition-colors"
                  title="Notifications">
            <i class="fas fa-bell text-lg"></i>
            <span id="notif-badge"
                  class="hidden absolute -top-0.5 -right-0.5 bg-red-500 text-white text-[9px] font-bold rounded-full min-w-[1rem] h-4 flex items-center justify-center px-0.5 leading-none">
              0
            </span>
          </button>
          <div id="notif-panel"
               class="hidden absolute right-0 top-full mt-2 w-80 max-w-[calc(100vw-1rem)] max-sm:fixed max-sm:inset-x-2 max-sm:top-16 max-sm:w-auto max-sm:mt-0 bg-white rounded-xl shadow-xl border border-gray-100 z-50 overflow-hidden">
            <div class="flex items-center justify-between px-4 py-3 border-b border-gray-100">
              <p class="text-sm font-semibold text-gray-700">Notifications</p>
            </div>
            <div id="notif-panel-content" class="max-h-80 overflow-y-auto"></div>
          </div>
        </div>

        <!-- User menu (desktop only) -->
        <div id="user-menu-wrapper" class="hidden md:block relative">
          <button id="login-btn"
                  class="bg-amber-500 hover:bg-amber-600 text-white px-6 py-2.5 rounded-full text-sm font-medium transition-all">
            Member Login
          </button>
          <div id="user-dropdown"
               class="hidden absolute right-0 top-full mt-2 w-52 bg-white rounded-xl shadow-lg border border-gray-100 py-1 z-50">
          </div>
        </div>

        <button id="mobile-btn" class="lg:hidden text-3xl text-white p-1">
          <i class="fas fa-bars"></i>
        </button>
      </div>
    </div>
  </div>

  <!-- position:absolute (not a normal-flow child) so opening this never
       changes <nav>'s own height — it used to, which broke the hero
       banner's -mt-16 offset (calibrated for the collapsed nav height
       only) and exposed the plain page background above the menu. -->
  <div id="mobile-menu" class="hidden lg:hidden absolute top-full left-0 right-0 bg-[#0A3D62] border-t border-white/10 py-6 max-h-[calc(100vh-4rem)] overflow-y-auto shadow-lg">
    <div class="flex flex-col px-6 space-y-6 text-base font-medium text-white/90">
      <a href="/index.html" class="hover:text-amber-400">HOME</a>
      <a href="/sermons.html" class="hover:text-amber-400">SERMONS</a>
      <a href="/events.html" class="hover:text-amber-400">EVENTS</a>
      <a href="/blog.html" class="hover:text-amber-400">BLOG</a>
      <a href="/about.html" class="hover:text-amber-400">ABOUT</a>
      <a href="/william-branham.html" class="hover:text-amber-400">WILLIAM BRANHAM</a>
      <a href="/gallery.html" data-feature="gallery" class="hover:text-amber-400">GALLERY</a>
      <a href="/music.html" data-feature="music" class="hover:text-amber-400">MUSIC</a>
      <a href="/connect.html" class="hover:text-amber-400">CONNECT</a>
      <button id="mobile-login-btn"
              class="bg-amber-500 text-white py-4 rounded-full font-medium mt-4">
        Member Login
      </button>
      <div id="mobile-user-links" class="hidden"></div>
    </div>
  </div>
</nav>
