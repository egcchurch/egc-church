<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0A3D62">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="EGC">
  <link rel="apple-touch-icon" href="assets/images/icons/icon-192.png">
  <title>Reports | Emmanuel Gospel Centre</title>

  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
  <link rel="stylesheet" href="/assets/css/tailwind.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

  <style>
    .post-body p { margin: 0 0 1rem; line-height: 1.75; color: #374151; }
  </style>
</head>
<body class="bg-zinc-50 font-sans">

  <div id="nav-placeholder" class="contents"></div>

  <!-- LOADING STATE -->
  <div id="loading-state" class="text-center py-32 text-gray-400">
    <i class="fas fa-spinner fa-spin text-3xl mb-3 block"></i>
    Loading...
  </div>

  <!-- ERROR STATE -->
  <div id="error-state" class="hidden text-center py-32 text-red-400">
    <i class="fas fa-exclamation-circle text-3xl mb-3 block"></i>
    <p>Post not found.</p>
    <a href="/blog.html" class="mt-4 inline-block text-sm text-amber-600 hover:underline">
      <i class="fas fa-arrow-left mr-1"></i> Back to Reports
    </a>
  </div>

  <!-- POST CONTENT -->
  <article id="post-content" class="hidden">

    <!-- Cover image -->
    <div id="post-hero" class="hidden w-full bg-[#0A3D62] overflow-hidden" style="max-height: 400px;">
      <img id="post-hero-img" src="" alt="" class="w-full object-cover" style="max-height: 400px;">
    </div>

    <div class="max-w-3xl mx-auto px-6 py-10">

      <!-- Back link -->
      <a href="/blog.html" class="inline-flex items-center gap-1.5 text-sm text-gray-500 hover:text-amber-600 transition mb-8">
        <i class="fas fa-arrow-left text-xs"></i> Back to Reports
      </a>

      <!-- Meta -->
      <div class="flex flex-wrap items-center gap-2 mb-4">
        <span id="post-kind-badge" class="text-xs px-2.5 py-1 rounded-full font-medium"></span>
        <span class="text-sm text-gray-500" id="post-date"></span>
        <span id="post-author-wrap" class="hidden text-sm text-gray-500">
          &bull; <span id="post-author"></span>
        </span>
      </div>

      <!-- Title -->
      <h1 id="post-title" class="text-3xl sm:text-4xl font-bold text-[#0A3D62] leading-tight mb-8"></h1>

      <!-- Body -->
      <div id="post-body" class="post-body mb-10"></div>

      <!-- Bottom back link -->
      <div class="pt-6 border-t border-gray-100">
        <a href="/blog.html" class="inline-flex items-center gap-1.5 text-sm text-amber-600 hover:underline font-medium">
          <i class="fas fa-arrow-left text-xs"></i> Back to Reports
        </a>
      </div>

    </div>
  </article>

  <div id="footer-placeholder"></div>

  <script src="/firebase-config.js"></script>
  <script src="/js/nav.js"></script>
  <script src="/js/main.js"></script>
  <script>
    function waitForFirebase(cb) {
      if (typeof firebase !== 'undefined' && firebase.apps && firebase.apps.length > 0) cb();
      else setTimeout(() => waitForFirebase(cb), 100);
    }

    function loadPost() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');
      if (!id) { showError(); return; }

      firebase.firestore().collection('blog').doc(id).get({ source: 'server' })
        .then(doc => {
          const data = doc.data();
          if (!doc.exists || data.kind === 'story' || !data.published) { showError(); return; }
          renderPost(data);
        })
        .catch(() => showError());
    }

    function renderPost(post) {
      document.title = post.title + ' | Emmanuel Gospel Centre';

      if (post.imageUrl) {
        document.getElementById('post-hero-img').src = post.imageUrl;
        document.getElementById('post-hero-img').alt = post.title;
        document.getElementById('post-hero').classList.remove('hidden');
      }

      const badge = document.getElementById('post-kind-badge');
      if ((post.kind || 'article') === 'announcement') {
        badge.textContent = 'Announcement';
        badge.classList.add('bg-amber-100', 'text-amber-700');
      } else {
        badge.textContent = 'Article';
        badge.classList.add('bg-blue-100', 'text-blue-700');
      }

      if (post.publishedAt) {
        const d = typeof post.publishedAt.toDate === 'function'
          ? post.publishedAt.toDate() : new Date(post.publishedAt);
        document.getElementById('post-date').textContent =
          d.toLocaleDateString('en-ZA', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
      }

      if (post.author) {
        document.getElementById('post-author').textContent = post.author;
        document.getElementById('post-author-wrap').classList.remove('hidden');
      }

      document.getElementById('post-title').textContent = post.title;
      document.getElementById('post-body').innerHTML = renderBody(post.body || '');

      document.getElementById('loading-state').classList.add('hidden');
      document.getElementById('post-content').classList.remove('hidden');
    }

    function renderBody(text) {
      if (!text.trim()) return '';
      return text.split(/\n\n+/)
        .map(para => `<p>${escHtml(para).replace(/\n/g, '<br>')}</p>`)
        .join('');
    }

    function showError() {
      document.getElementById('loading-state').classList.add('hidden');
      document.getElementById('error-state').classList.remove('hidden');
    }

    function escHtml(str) {
      return String(str || '')
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    document.addEventListener('DOMContentLoaded', () => waitForFirebase(loadPost));
  </script>
</body>
</html>
