<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0A3D62">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="EGC">
  <link rel="apple-touch-icon" href="assets/images/icons/icon-192.png">
  <title>Sermons Archive | Emmanuel Gospel Centre</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

  <style>
    .active-view {
      background-color: #0A3D62;
      color: white;
      box-shadow: 0 2px 4px rgba(10, 61, 98, 0.2);
    }
    .resource-btn {
      @apply px-4 py-1.5 text-xs font-medium rounded-xl flex items-center gap-1 transition hover:scale-105;
    }
  </style>
</head>
<body class="bg-zinc-50 font-sans">

  <!-- Navigation (shared — see nav.html, injected by js/nav.js) -->
  <div id="nav-placeholder"></div>

  <!-- Header -->
  <header class="bg-[#0A3D62] text-white py-16">
    <div class="max-w-7xl mx-auto px-6 text-center">
      <h1 class="text-5xl font-bold mb-4">Sermon Archive</h1>
      <p class="text-amber-200 max-w-lg mx-auto">Faith comes by hearing the Word of God</p>
    </div>
  </header>

  <div class="max-w-7xl mx-auto px-6 py-10">
    
    <!-- Toggle + Search -->
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mb-10">
      <div class="flex bg-white rounded-3xl shadow-sm p-1 border border-gray-200">
        <button onclick="setView('card')" id="card-btn" class="px-6 py-3 rounded-3xl flex items-center gap-2 font-medium">
          <i class="fas fa-th-large"></i> Card View
        </button>
        <button onclick="setView('table')" id="table-btn" class="px-6 py-3 rounded-3xl flex items-center gap-2 font-medium active-view">
          <i class="fas fa-list"></i> Table View
        </button>
      </div>

      <input type="text" id="search-input" 
             placeholder="Search by title or speaker..." 
             class="flex-1 max-w-md px-6 py-4 border border-gray-300 rounded-3xl focus:outline-none focus:border-amber-500">
    </div>

    <!-- Card View -->
    <div id="card-view" class="hidden grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>

    <!-- Table View (Default) -->
    <div id="table-view">
      <table class="w-full bg-white rounded-3xl shadow-sm overflow-hidden">
        <thead class="bg-gray-50">
          <tr>
            <th class="text-left px-8 py-5 font-semibold">Date</th>
            <th class="text-left px-8 py-5 font-semibold">Speaker</th>
            <th class="text-left px-8 py-5 font-semibold">Title</th>
            <th class="text-left px-8 py-5 font-semibold">Resources</th>
          </tr>
        </thead>
        <tbody id="table-body" class="divide-y text-sm"></tbody>
      </table>
    </div>
  </div>

  <script src="firebase-config.js"></script>
  <script src="/js/nav.js"></script>
  <script src="js/main.js"></script>
  <script src="js/sermons.js"></script>
</body>
</html>
