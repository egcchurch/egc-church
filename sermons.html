<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0A3D62">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="EGC">
  <link rel="apple-touch-icon" href="assets/images/icons/icon-192.png">
  <title>Sermons Archive | Emmanuel Gospel Centre</title>
  
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
  <link rel="stylesheet" href="/assets/css/tailwind.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

  <style>
    .active-view {
      background-color: #0A3D62;
      color: white;
      box-shadow: 0 2px 4px rgba(10, 61, 98, 0.2);
    }
    .resource-btn {
      @apply px-4 py-1.5 text-xs font-medium rounded-xl flex items-center gap-1 transition hover:scale-105;
    }

    /* Video modal — same pattern as story.html, YouTube-only here */
    #video-modal {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92);
      z-index: 1001; align-items: center; justify-content: center; padding: 1rem;
    }
    #video-modal.open { display: flex; }
    /* Fit within BOTH viewport width and height — on a landscape phone (wide,
       short) a width-only cap can make a 16:9 box taller than the screen. The
       third min() term converts the available height into the equivalent
       16:9 width, so whichever dimension is tighter wins. */
    #video-modal-inner {
      position: relative;
      width: min(56rem, calc(100vw - 2rem), calc((100vh - 6rem) * 16 / 9));
    }
    #video-modal-close {
      position: absolute; top: -2.25rem; right: 0;
      color: white; font-size: 1.75rem; cursor: pointer; line-height: 1;
    }
    .video-modal-frame { position: relative; padding-top: 56.25%; background: #000; border-radius: 0.75rem; overflow: hidden; }
    .video-modal-frame iframe { position: absolute; inset: 0; width: 100%; height: 100%; }
  </style>
</head>
<body class="bg-zinc-50 font-sans">

  <!-- Navigation (shared — see nav.html, injected by js/nav.js) -->
  <div id="nav-placeholder" class="contents"></div>

  <!-- Header -->
  <header data-hero-banner class="relative -mt-16 pt-32 pb-16 bg-[#0A3D62] text-white">
    <div class="max-w-7xl mx-auto px-6 text-center">
      <h1 class="text-5xl font-bold mb-4">Sermon Archive</h1>
      <p class="text-amber-200 max-w-lg mx-auto">Faith comes by hearing the Word of God</p>
    </div>
  </header>

  <div class="max-w-7xl mx-auto px-6 py-10">
    
    <!-- Toggle + Search -->
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mb-10">
      <div class="flex bg-white rounded-3xl shadow-sm p-1 border border-gray-200">
        <button onclick="setView('card')" id="card-btn" class="px-6 py-3 rounded-3xl flex items-center gap-2 font-medium">
          <i class="fas fa-th-large"></i> Card View
        </button>
        <button onclick="setView('table')" id="table-btn" class="px-6 py-3 rounded-3xl flex items-center gap-2 font-medium active-view">
          <i class="fas fa-list"></i> Table View
        </button>
        <button onclick="setView('series')" id="series-btn" class="px-6 py-3 rounded-3xl flex items-center gap-2 font-medium">
          <i class="fas fa-layer-group"></i> Series
        </button>
      </div>

      <input type="text" id="search-input"
             placeholder="Search by title or speaker..."
             class="flex-1 max-w-md px-6 py-4 border border-gray-300 rounded-3xl focus:outline-none focus:border-amber-500">
    </div>

    <!-- Card View -->
    <div id="card-view" class="hidden grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>

    <!-- Table View (Default) -->
    <div id="table-view">
      <table class="w-full bg-white rounded-3xl shadow-sm overflow-hidden">
        <thead class="bg-gray-50">
          <tr>
            <th class="text-left px-8 py-5 font-semibold">Date</th>
            <th class="text-left px-8 py-5 font-semibold">Speaker</th>
            <th class="text-left px-8 py-5 font-semibold">Title</th>
            <th class="text-left px-8 py-5 font-semibold">Resources</th>
          </tr>
        </thead>
        <tbody id="table-body" class="divide-y text-sm"></tbody>
      </table>
    </div>

    <!-- Series View -->
    <div id="series-view" class="hidden">
      <!-- Series list -->
      <div id="series-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
      <!-- Single series detail (drill-down) -->
      <div id="series-detail" class="hidden">
        <button onclick="showSeriesList()" class="flex items-center gap-2 text-sm text-amber-600 hover:text-amber-700 font-medium mb-6">
          <i class="fas fa-arrow-left"></i> Back to Series
        </button>
        <h2 id="series-detail-title" class="text-2xl font-bold text-[#0A3D62] mb-2"></h2>
        <p id="series-detail-desc" class="text-gray-500 mb-8"></p>
        <div id="series-sermons-list" class="space-y-3"></div>
      </div>
    </div>
  </div>

  <!-- VIDEO MODAL -->
  <div id="video-modal" role="dialog" aria-modal="true" aria-label="Sermon video player">
    <div id="video-modal-inner">
      <span id="video-modal-close" onclick="closeVideoModal()" title="Close">&times;</span>
      <div class="video-modal-frame">
        <iframe id="video-modal-iframe" src="" frameborder="0"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen"
                allowfullscreen></iframe>
      </div>
      <p id="video-modal-title" class="text-white text-center mt-3 text-sm opacity-80"></p>
    </div>
  </div>

  <script src="firebase-config.js"></script>
  <script src="/js/nav.js"></script>
  <script src="js/main.js"></script>
  <script src="js/sermons.js"></script>
</body>
</html>
