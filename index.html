<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0A3D62">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="EGC">
  <link rel="apple-touch-icon" href="assets/images/icons/icon-192.png">
  <title>Emmanuel Gospel Centre | EGC Church</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <!-- Firebase SDK (needed for auth state check) -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>
<body class="bg-zinc-50 font-sans overflow-x-hidden">

  <!-- Navigation (shared — see nav.html, injected by js/nav.js) -->
  <div id="nav-placeholder"></div>

  <!-- HERO VIDEO -->
  <header class="relative h-screen flex items-center justify-center text-center text-white overflow-hidden">
    <video id="hero-video" 
           class="absolute inset-0 w-full h-full object-cover" 
           autoplay muted loop playsinline>
      <source src="assets/videos/CloudVideo.mp4" type="video/mp4">
    </video>
    <div class="absolute inset-0 bg-black/65"></div>

    <div class="relative z-10 max-w-5xl mx-auto px-6">
      <p class="uppercase tracking-[4px] text-amber-200 text-sm mb-6">Welcome to</p>
      <h1 class="text-5xl md:text-7xl font-bold leading-none tracking-tighter drop-shadow-2xl">
        EMMANUEL<br>
        <span class="text-4xl md:text-5xl block mt-4">- GOSPEL CENTRE -</span>
      </h1>
      <p class="mt-10 text-xl md:text-2xl max-w-md mx-auto text-amber-100">
        May the Lord richly bless you
      </p>
    </div>
  </header>

  <script src="firebase-config.js"></script>
  <script src="/js/nav.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
