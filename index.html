<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0A3D62">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="EGC">
  <link rel="apple-touch-icon" href="assets/images/icons/icon-192.png">
  <title>Emmanuel Gospel Centre | EGC Church</title>

  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <!-- Firebase SDK (needed for auth state check) -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>
<body class="bg-zinc-50 font-sans overflow-x-hidden" data-page-sections="homepage">

  <!-- Navigation (shared — see nav.html, injected by js/nav.js) -->
  <div id="nav-placeholder"></div>

  <!-- HERO VIDEO — not composable, always first -->
  <header class="relative h-screen flex items-center justify-center text-center text-white overflow-hidden">
    <video id="hero-video"
           class="absolute inset-0 w-full h-full object-cover"
           autoplay muted loop playsinline>
      <source src="assets/videos/CloudVideo.mp4" type="video/mp4">
    </video>
    <div class="absolute inset-0 bg-black/65"></div>

    <div class="relative z-10 max-w-5xl mx-auto px-6">
      <p class="uppercase tracking-[4px] text-amber-200 text-sm mb-6">Welcome to</p>
      <h1 class="text-5xl md:text-7xl font-bold leading-none tracking-tighter drop-shadow-2xl">
        EMMANUEL<br>
        <span class="text-4xl md:text-5xl block mt-4">- GOSPEL CENTRE -</span>
      </h1>
      <p id="hero-tagline" class="mt-10 text-2xl md:text-3xl max-w-md mx-auto text-amber-100">
        May the Lord richly bless you
      </p>
    </div>

    <div class="absolute bottom-0 left-0 right-0 h-32 bg-gradient-to-t from-black/60 to-transparent pointer-events-none"></div>
    <div class="absolute bottom-8 left-1/2 -translate-x-1/2 animate-bounce text-amber-400 text-2xl z-10">
      <i class="fas fa-chevron-down"></i>
    </div>
  </header>

  <!-- Adaptive section — auth-state driven, not composable. Placed right after
       the hero so a logged-in member's personalised greeting/quick-links are
       the first thing reached on scroll, ahead of public visitor content. -->
  <div id="adaptive-section"></div>

  <!-- Announcement — not composable, conditional on Firestore content -->
  <div id="announcement-section" class="hidden">
    <div class="bg-amber-500 text-white py-4 px-6">
      <div class="max-w-4xl mx-auto flex items-start gap-4">
        <i class="fas fa-bullhorn flex-shrink-0 mt-0.5"></i>
        <div>
          <p id="announcement-title" class="font-bold text-sm"></p>
          <p id="announcement-body" class="text-amber-100 text-sm mt-0.5"></p>
        </div>
      </div>
    </div>
  </div>

  <!-- Service Times — composable (toggle), loaded by js/homepage.js -->
  <section data-section="serviceTimes" id="service-times-section" class="hidden bg-[#0A3D62] text-white py-14 px-6">
    <div class="max-w-4xl mx-auto text-center">
      <h2 class="text-2xl font-bold mb-10 tracking-tight">Join Us</h2>
      <div id="service-times-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-6 justify-items-center"></div>
    </div>
  </section>

  <!-- Composable sections container — sections below can be toggled and reordered -->
  <div data-sections-container="homepage">

    <!-- Latest Sermons — populated by js/homepage.js -->
    <section data-section="latestSermons" id="latest-sermons-section" class="bg-white py-14 px-6">
      <div class="max-w-7xl mx-auto">
        <div class="flex items-center justify-between mb-8">
          <h2 class="text-2xl font-bold text-[#0A3D62] tracking-tight">Latest Sermons</h2>
          <a href="/sermons.html" class="text-sm text-amber-600 hover:text-amber-700 font-medium">View all →</a>
        </div>
        <div id="latest-sermons-grid" class="grid grid-cols-1 sm:grid-cols-3 gap-6"></div>
      </div>
    </section>

    <!-- Explore — quick links grid -->
    <section data-section="explore" class="bg-zinc-50 py-14 px-6">
      <div class="max-w-4xl mx-auto">
        <h2 class="text-2xl font-bold text-[#0A3D62] text-center mb-10 tracking-tight">Explore</h2>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">

          <a href="/sermons.html"
             class="bg-white rounded-2xl shadow-sm border border-zinc-200 p-6 flex flex-col items-center gap-3 hover:shadow-md hover:border-amber-300 transition-all text-center group">
            <div class="w-12 h-12 bg-amber-50 rounded-xl flex items-center justify-center group-hover:bg-amber-100 transition-colors">
              <i class="fas fa-bible text-amber-600 text-xl"></i>
            </div>
            <span class="font-semibold text-[#0A3D62] text-sm">Sermons</span>
          </a>

          <a href="/events.html"
             class="bg-white rounded-2xl shadow-sm border border-zinc-200 p-6 flex flex-col items-center gap-3 hover:shadow-md hover:border-amber-300 transition-all text-center group">
            <div class="w-12 h-12 bg-[#0A3D62]/10 rounded-xl flex items-center justify-center group-hover:bg-[#0A3D62]/20 transition-colors">
              <i class="fas fa-calendar-days text-[#0A3D62] text-xl"></i>
            </div>
            <span class="font-semibold text-[#0A3D62] text-sm">Events</span>
          </a>

          <a href="/music.html"
             class="bg-white rounded-2xl shadow-sm border border-zinc-200 p-6 flex flex-col items-center gap-3 hover:shadow-md hover:border-amber-300 transition-all text-center group">
            <div class="w-12 h-12 bg-amber-50 rounded-xl flex items-center justify-center group-hover:bg-amber-100 transition-colors">
              <i class="fas fa-music text-amber-600 text-xl"></i>
            </div>
            <span class="font-semibold text-[#0A3D62] text-sm">Music</span>
          </a>

          <a href="/connect.html"
             class="bg-white rounded-2xl shadow-sm border border-zinc-200 p-6 flex flex-col items-center gap-3 hover:shadow-md hover:border-amber-300 transition-all text-center group">
            <div class="w-12 h-12 bg-[#0A3D62]/10 rounded-xl flex items-center justify-center group-hover:bg-[#0A3D62]/20 transition-colors">
              <i class="fas fa-handshake text-[#0A3D62] text-xl"></i>
            </div>
            <span class="font-semibold text-[#0A3D62] text-sm">Connect</span>
          </a>

        </div>
      </div>
    </section>

    <!-- Connect CTA -->
    <section data-section="connectCta" class="bg-[#0A3D62] text-white py-16 px-6">
      <div class="max-w-3xl mx-auto text-center">
        <p class="text-amber-300 uppercase tracking-widest text-xs mb-3">New here?</p>
        <h2 class="text-3xl font-bold mb-4 tracking-tight">Plan your first visit</h2>
        <p class="text-blue-200 mb-8 max-w-md mx-auto">
          We'd love to welcome you. Let us know you're coming and we'll make sure you feel at home.
        </p>
        <a href="/connect.html"
           class="inline-block bg-amber-500 hover:bg-amber-600 text-white px-8 py-3.5 rounded-full font-medium transition-all">
          Get in touch
        </a>
      </div>
    </section>

  </div><!-- end composable container -->

  <div id="footer-placeholder"></div>

  <script src="/church-config.js"></script>
  <script src="firebase-config.js"></script>
  <script src="/js/nav.js"></script>
  <script src="js/main.js"></script>
  <script src="/js/permissions.js"></script>
  <script src="/js/homepage.js"></script>
</body>
</html>
