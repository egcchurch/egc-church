<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0A3D62">
  <title>Event Management | EGC Admin</title>

  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
  <link rel="stylesheet" href="/assets/css/tailwind.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
</head>
<body class="bg-zinc-50 font-sans overflow-x-hidden">

  <!-- Navigation (shared — see admin-nav.html, injected by js/nav.js) -->
  <div id="nav-placeholder" class="contents"></div>

  <!-- PAGE HEADER -->
  <div class="bg-[#0A3D62] text-white py-10 px-6">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
      <div>
        <h1 class="text-3xl font-bold tracking-tight">Event Management</h1>
        <p class="text-blue-200 mt-1">Add and manage church calendar events</p>
      </div>
      <button onclick="openForm()"
              class="bg-amber-500 hover:bg-amber-600 text-white px-6 py-2.5 rounded-full text-sm font-medium transition-all">
        <i class="fas fa-plus mr-2"></i>Add Event
      </button>
    </div>
  </div>

  <!-- ADD/EDIT FORM -->
  <div id="event-form" class="hidden bg-white border-b shadow-sm">
    <div class="max-w-7xl mx-auto px-6 py-8">
      <h2 class="text-xl font-bold text-[#0A3D62] mb-6" id="form-title">Add New Event</h2>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

        <!-- Title -->
        <div class="md:col-span-2">
          <label class="block text-sm font-medium text-gray-700 mb-1">Title *</label>
          <input id="f-title" type="text" placeholder="Event title"
                 class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400">
        </div>

        <!-- Description -->
        <div class="md:col-span-2">
          <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
          <textarea id="f-description" rows="3" placeholder="Describe the event..."
                    class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400 resize-none"></textarea>
        </div>

        <!-- Location -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Location</label>
          <input id="f-location" type="text" placeholder="e.g. Main Hall, EGC"
                 class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400">
        </div>

        <!-- Category -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Category *</label>
          <select id="f-category"
                  class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400 bg-white">
            <option value="service">Service</option>
            <option value="group">Group</option>
            <option value="special">Special</option>
            <option value="other">Other</option>
          </select>
        </div>

        <!-- Start Date -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Start Date *</label>
          <input id="f-start-date" type="date"
                 class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400">
        </div>

        <!-- Start Time -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Start Time</label>
          <input id="f-start-time" type="time"
                 class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400">
        </div>

        <!-- End Date -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">End Date</label>
          <input id="f-end-date" type="date"
                 class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400">
        </div>

        <!-- End Time -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">End Time</label>
          <input id="f-end-time" type="time"
                 class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400">
        </div>

        <!-- Audience -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Audience *</label>
          <select id="f-audience"
                  class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400 bg-white">
            <option value="public">Public</option>
            <option value="members">Members only</option>
          </select>
        </div>

        <!-- Cover Image -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Cover Image (optional)</label>
          <div id="cover-preview" class="hidden mb-3">
            <img id="cover-preview-img" src="" alt="Cover preview" class="h-36 w-full object-cover rounded-xl">
            <button type="button" onclick="removeCover()"
                    class="mt-1 text-xs text-red-500 hover:underline">Remove photo</button>
          </div>
          <label class="flex items-center gap-2 cursor-pointer bg-amber-50 hover:bg-amber-100 border border-amber-200 text-amber-700 text-sm px-4 py-2.5 rounded-xl transition w-fit">
            <i class="fas fa-image"></i> Choose Cover Photo
            <input id="cover-file-input" type="file" accept="image/*" class="hidden" onchange="onCoverFileSelected(event)">
          </label>
        </div>

        <!-- Published toggle -->
        <div class="flex items-center gap-3 pt-6">
          <input id="f-published" type="checkbox" class="w-4 h-4 accent-amber-500">
          <label for="f-published" class="text-sm font-medium text-gray-700">Published (visible on site)</label>
        </div>

        <!-- RSVP toggle — off for purely informational events (e.g. "a visiting minister will
             be with us Wednesday") where there's nothing to reserve. On by default so every
             pre-existing event keeps behaving exactly as it did before this shipped. -->
        <div class="flex items-center gap-3 pt-6">
          <input id="f-rsvp-enabled" type="checkbox" class="w-4 h-4 accent-amber-500" checked>
          <label for="f-rsvp-enabled" class="text-sm font-medium text-gray-700">Enable RSVP</label>
        </div>

      </div>
      <div class="flex gap-3 mt-6">
        <button onclick="saveEvent()"
                class="bg-amber-500 hover:bg-amber-600 text-white px-8 py-3 rounded-full text-sm font-medium transition-all">
          Save Event
        </button>
        <button onclick="closeForm()"
                class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-8 py-3 rounded-full text-sm font-medium transition-all">
          Cancel
        </button>
      </div>
    </div>
  </div>

  <!-- EVENT LIST -->
  <main class="max-w-7xl mx-auto px-6 py-10">
    <div id="event-list" class="space-y-4">
      <div class="text-center py-12 text-gray-400">
        <i class="fas fa-spinner fa-spin text-3xl mb-3"></i>
        <p>Loading events...</p>
      </div>
    </div>
  </main>

  <!-- TOAST -->
  <div id="toast"
       class="fixed bottom-6 right-6 z-50 hidden px-6 py-3 rounded-2xl text-white text-sm font-medium shadow-lg transition-all">
  </div>

  <script src="/firebase-config.js"></script>
  <script src="/js/nav.js"></script>
  <script src="/js/main.js"></script>
  <script src="/js/storage-upload.js"></script>
  <script src="/js/permissions.js"></script>
  <script src="/js/admin-auth.js" data-require-perm="events.manage"></script>
  <script>
    const db = firebase.firestore();
    let editingId = null;
    let stagedCoverFile = null;
    let existingCoverUrl = null;
    const eventsCache = {};

    // ─── Toast ───────────────────────────────────────────────────────────────────
    function showToast(message, type) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = 'fixed bottom-6 right-6 z-50 px-6 py-3 rounded-2xl text-white text-sm font-medium shadow-lg transition-all '
        + (type === 'error' ? 'bg-red-600' : 'bg-green-600');
      setTimeout(() => toast.classList.add('hidden'), 3000);
    }

    // ─── Form ─────────────────────────────────────────────────────────────────
    function openForm(id) {
      editingId = id || null;
      stagedCoverFile = null;
      const event = id ? eventsCache[id] : null;

      document.getElementById('form-title').textContent = id ? 'Edit Event' : 'Add New Event';
      document.getElementById('f-title').value        = event?.title        || '';
      document.getElementById('f-description').value  = event?.description  || '';
      document.getElementById('f-location').value     = event?.location     || '';
      document.getElementById('f-category').value     = event?.category     || 'service';
      document.getElementById('f-audience').value     = event?.audience     || 'public';
      document.getElementById('f-published').checked  = event?.published    ?? true;
      document.getElementById('f-rsvp-enabled').checked = event?.rsvpEnabled ?? true;

      existingCoverUrl = event?.imageUrl || null;
      if (existingCoverUrl) {
        document.getElementById('cover-preview-img').src = existingCoverUrl;
        document.getElementById('cover-preview').classList.remove('hidden');
      } else {
        document.getElementById('cover-preview').classList.add('hidden');
        document.getElementById('cover-preview-img').src = '';
      }
      document.getElementById('cover-file-input').value = '';

      const { date: sd, time: st } = splitTimestamp(event?.startDate);
      const { date: ed, time: et } = splitTimestamp(event?.endDate);
      document.getElementById('f-start-date').value = sd;
      document.getElementById('f-start-time').value = st;
      document.getElementById('f-end-date').value   = ed;
      document.getElementById('f-end-time').value   = et;

      document.getElementById('event-form').classList.remove('hidden');
      document.getElementById('event-form').scrollIntoView({ behavior: 'smooth' });
    }

    function closeForm() {
      editingId = null;
      stagedCoverFile = null;
      existingCoverUrl = null;
      document.getElementById('event-form').classList.add('hidden');
    }

    function onCoverFileSelected(e) {
      const file = e.target.files[0];
      if (!file) return;
      stagedCoverFile = file;
      document.getElementById('cover-preview-img').src = URL.createObjectURL(file);
      document.getElementById('cover-preview').classList.remove('hidden');
    }

    function removeCover() {
      stagedCoverFile = null;
      existingCoverUrl = null;
      document.getElementById('cover-preview').classList.add('hidden');
      document.getElementById('cover-preview-img').src = '';
      document.getElementById('cover-file-input').value = '';
    }

    async function saveEvent() {
      const title     = document.getElementById('f-title').value.trim();
      const startDate = document.getElementById('f-start-date').value;

      if (!title || !startDate) {
        showToast('Title and start date are required.', 'error');
        return;
      }

      const ref = editingId
        ? db.collection('events').doc(editingId)
        : db.collection('events').doc();

      let imageUrl = existingCoverUrl || null;
      if (stagedCoverFile) {
        try {
          const blob = await compressImage(stagedCoverFile);
          imageUrl = await uploadMedia(`events/${ref.id}/cover`, blob);
        } catch (err) {
          showToast('Error uploading image: ' + err.message, 'error');
          return;
        }
      }

      const data = {
        title,
        description : document.getElementById('f-description').value.trim(),
        location    : document.getElementById('f-location').value.trim(),
        category    : document.getElementById('f-category').value,
        audience    : document.getElementById('f-audience').value,
        imageUrl,
        published   : document.getElementById('f-published').checked,
        rsvpEnabled : document.getElementById('f-rsvp-enabled').checked,
        startDate   : buildTimestamp(startDate, document.getElementById('f-start-time').value),
        updatedAt   : firebase.firestore.FieldValue.serverTimestamp(),
      };

      const endDateVal = document.getElementById('f-end-date').value;
      data.endDate = endDateVal
        ? buildTimestamp(endDateVal, document.getElementById('f-end-time').value)
        : null;

      if (!editingId) {
        data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
      }

      ref.set(data, { merge: true })
        .then(() => {
          closeForm();
          showToast('Event saved.', 'success');
          loadEvents();
        })
        .catch(err => showToast('Error saving event: ' + err.message, 'error'));
    }

    function deleteEvent(id, title) {
      if (!confirm('Delete "' + title + '"? This cannot be undone.')) return;
      db.collection('events').doc(id).delete()
        .then(() => {
          showToast('Event deleted.', 'success');
          loadEvents();
        })
        .catch(err => showToast('Error: ' + err.message, 'error'));
    }

    // ─── List ─────────────────────────────────────────────────────────────────
    function loadEvents() {
      const list = document.getElementById('event-list');
      list.innerHTML = `<div class="text-center py-12 text-gray-400">
        <i class="fas fa-spinner fa-spin text-3xl mb-3"></i><p>Loading...</p>
      </div>`;

      db.collection('events').orderBy('startDate', 'desc').get()
        .then((snapshot) => {
          if (snapshot.empty) {
            list.innerHTML = `<div class="text-center py-12 text-gray-400">
              <i class="fas fa-calendar text-3xl mb-3"></i>
              <p>No events yet. Click Add Event to get started.</p>
            </div>`;
            return;
          }

          list.innerHTML = '';
          snapshot.forEach(doc => {
            const e = doc.data();
            eventsCache[doc.id] = e;

            const startStr   = formatTimestamp(e.startDate);
            const catBadge   = categoryBadge(e.category);
            const audBadge   = e.audience === 'members'
              ? '<span class="text-xs px-2 py-1 rounded-full bg-purple-100 text-purple-700">Members</span>'
              : '<span class="text-xs px-2 py-1 rounded-full bg-blue-100 text-blue-700">Public</span>';
            const pubBadge   = e.published
              ? '<span class="text-xs px-2 py-1 rounded-full bg-green-100 text-green-700">Published</span>'
              : '<span class="text-xs px-2 py-1 rounded-full bg-gray-100 text-gray-500">Draft</span>';

              const rsvpCount = (e.rsvps || []).length;
            const rsvpBadge = rsvpCount > 0
              ? `<span class="text-xs px-2 py-1 rounded-full bg-amber-100 text-amber-700"><i class="fas fa-calendar-check mr-1"></i>${rsvpCount} RSVP</span>`
              : '';

            list.innerHTML += `
              <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-6" id="admin-event-${doc.id}">
                <div class="flex flex-col md:flex-row md:items-center gap-4">
                  <div class="flex-1 min-w-0">
                    <div class="flex flex-wrap items-center gap-2 mb-2">
                      ${pubBadge}
                      ${catBadge}
                      ${audBadge}
                      ${rsvpBadge}
                    </div>
                    <p class="font-semibold text-gray-900 truncate">${escHtml(e.title)}</p>
                    <div class="flex flex-wrap gap-x-4 mt-1 text-sm text-gray-500">
                      <span><i class="fas fa-calendar text-amber-400 mr-1"></i>${startStr}</span>
                      ${e.location ? `<span><i class="fas fa-map-marker-alt text-amber-400 mr-1"></i>${escHtml(e.location)}</span>` : ''}
                    </div>
                  </div>
                  <div class="flex gap-2 shrink-0 flex-wrap">
                    ${rsvpCount > 0 ? `<button onclick="toggleRsvpList('${doc.id}')"
                            class="bg-amber-50 hover:bg-amber-100 text-amber-700 text-sm px-4 py-2 rounded-full transition">
                      <i class="fas fa-users mr-1"></i>RSVPs
                    </button>` : ''}
                    <button onclick="openForm('${doc.id}')"
                            class="bg-blue-50 hover:bg-blue-100 text-blue-600 text-sm px-4 py-2 rounded-full transition">
                      <i class="fas fa-edit mr-1"></i>Edit
                    </button>
                    <button onclick="deleteEvent('${doc.id}', '${escAttr(e.title)}')"
                            class="bg-red-50 hover:bg-red-100 text-red-600 text-sm px-4 py-2 rounded-full transition">
                      <i class="fas fa-trash mr-1"></i>Delete
                    </button>
                  </div>
                </div>
                <div id="rsvp-panel-${doc.id}" class="hidden mt-4 pt-4 border-t border-gray-100">
                  <p class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-3">RSVP List</p>
                  <div id="rsvp-list-${doc.id}" class="text-sm text-gray-500"><i class="fas fa-spinner fa-spin"></i> Loading...</div>
                </div>
              </div>`;
          });
        })
        .catch(() => {
          list.innerHTML = `<div class="text-center py-12 text-red-400"><p>Error loading events.</p></div>`;
        });
    }

    // ─── Helpers ──────────────────────────────────────────────────────────────

    function buildTimestamp(dateStr, timeStr) {
      const iso = timeStr ? dateStr + 'T' + timeStr : dateStr + 'T00:00:00';
      return firebase.firestore.Timestamp.fromDate(new Date(iso));
    }

    function splitTimestamp(ts) {
      if (!ts) return { date: '', time: '' };
      const d = typeof ts.toDate === 'function' ? ts.toDate() : new Date(ts);
      const date = d.toISOString().slice(0, 10);
      const time = d.toTimeString().slice(0, 5);
      return { date, time: time === '00:00' ? '' : time };
    }

    function formatTimestamp(ts) {
      if (!ts) return '—';
      const d = typeof ts.toDate === 'function' ? ts.toDate() : new Date(ts);
      return d.toLocaleDateString('en-ZA', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' });
    }

    function categoryBadge(cat) {
      const map = {
        service : 'bg-blue-100 text-blue-700',
        group   : 'bg-green-100 text-green-700',
        special : 'bg-amber-100 text-amber-700',
        other   : 'bg-gray-100 text-gray-600',
      };
      const label = cat ? cat.charAt(0).toUpperCase() + cat.slice(1) : 'Other';
      const cls   = map[cat] || map.other;
      return `<span class="text-xs px-2 py-1 rounded-full ${cls}">${label}</span>`;
    }

    function escHtml(str) {
      return String(str || '')
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function escAttr(str) {
      return String(str || '').replace(/'/g, "\\'").replace(/"/g, '&quot;');
    }

    async function toggleRsvpList(eventId) {
      const panel = document.getElementById('rsvp-panel-' + eventId);
      if (!panel) return;
      if (!panel.classList.contains('hidden')) {
        panel.classList.add('hidden');
        return;
      }
      panel.classList.remove('hidden');
      const listEl = document.getElementById('rsvp-list-' + eventId);
      const rsvps = (eventsCache[eventId] && eventsCache[eventId].rsvps) || [];
      if (!rsvps.length) {
        listEl.textContent = 'No RSVPs.';
        return;
      }
      try {
        const snaps = await Promise.all(rsvps.map(uid => db.collection('users').doc(uid).get()));
        const names = snaps.map(s => {
          const d = s.exists ? s.data() : null;
          return d ? (d.displayName || d.email || s.id) : s.id;
        });
        listEl.innerHTML = names.map(n => `<span class="inline-block bg-gray-100 rounded-full px-3 py-1 mr-2 mb-2">${escHtml(n)}</span>`).join('');
      } catch (err) {
        listEl.textContent = 'Failed to load names.';
      }
    }

    document.addEventListener('DOMContentLoaded', () => loadEvents());
  </script>
</body>
</html>
