<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0A3D62">
  <title>Sermon Management | EGC Admin</title>

  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>
<body class="bg-zinc-50 font-sans overflow-x-hidden">

  <!-- NAVIGATION -->
  <nav class="bg-white border-b sticky top-0 z-50 shadow-sm">
    <div class="max-w-7xl mx-auto px-6">
      <div class="flex justify-between items-center h-16">
        <div class="flex items-center gap-x-3">
          <div class="w-9 h-9 bg-amber-500 rounded-full flex items-center justify-center text-white text-2xl">✝</div>
          <div class="leading-none">
            <span class="font-bold text-xl tracking-tighter text-[#0A3D62]">EMMANUEL</span>
            <span class="block text-[10px] text-amber-600 font-medium">GOSPEL CENTRE</span>
          </div>
        </div>

        <div class="hidden md:flex items-center gap-x-8 text-sm font-medium">
          <a href="/index.html" class="hover:text-amber-600 transition-colors">HOME</a>
          <a href="/admin/sermons.html" class="text-amber-600 font-semibold">SERMONS</a>
          <a href="/admin/events.html" class="hover:text-amber-600 transition-colors">EVENTS</a>
          <a href="/admin/users.html" class="hover:text-amber-600 transition-colors">USERS</a>
        </div>

        <button id="login-btn"
                class="hidden md:block bg-amber-500 hover:bg-amber-600 text-white px-6 py-2.5 rounded-full text-sm font-medium transition-all">
          Member Login
        </button>

        <button id="mobile-btn" class="md:hidden text-3xl text-gray-700">
          <i class="fas fa-bars"></i>
        </button>
      </div>
    </div>

    <div id="mobile-menu" class="hidden md:hidden bg-white border-t py-6">
      <div class="flex flex-col px-6 space-y-6 text-base font-medium">
        <a href="/index.html" class="hover:text-amber-600">HOME</a>
        <a href="/admin/sermons.html" class="text-amber-600">SERMONS</a>
        <a href="/admin/events.html" class="hover:text-amber-600">EVENTS</a>
        <a href="/admin/users.html" class="hover:text-amber-600">USERS</a>
        <button id="mobile-login-btn"
                class="bg-amber-500 text-white py-4 rounded-full font-medium mt-4">
          Member Login
        </button>
      </div>
    </div>
  </nav>

  <!-- PAGE HEADER -->
  <div class="bg-[#0A3D62] text-white py-10 px-6">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
      <div>
        <h1 class="text-3xl font-bold tracking-tight">Sermon Management</h1>
        <p class="text-blue-200 mt-1">Add and manage sermon recordings</p>
      </div>
      <button onclick="openForm()"
              class="bg-amber-500 hover:bg-amber-600 text-white px-6 py-2.5 rounded-full text-sm font-medium transition-all">
        <i class="fas fa-plus mr-2"></i>Add Sermon
      </button>
    </div>
  </div>

  <!-- ADD/EDIT FORM -->
  <div id="sermon-form" class="hidden bg-white border-b shadow-sm">
    <div class="max-w-7xl mx-auto px-6 py-8">
      <h2 class="text-xl font-bold text-[#0A3D62] mb-6" id="form-title">Add New Sermon</h2>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Title *</label>
          <input id="f-title" type="text" placeholder="Sermon title"
                 class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Speaker *</label>
          <input id="f-speaker" type="text" placeholder="Pastor / Evangelist name"
                 class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Date *</label>
          <input id="f-date" type="date"
                 class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Duration</label>
          <input id="f-duration" type="text" placeholder="e.g. 45 min"
                 class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">YouTube ID</label>
          <input id="f-youtube" type="text" placeholder="e.g. dQw4w9WgXcQ"
                 class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Audio URL</label>
          <input id="f-audio" type="text" placeholder="assets/audio/sermon.mp3"
                 class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Notes URL (PDF)</label>
          <input id="f-notes" type="text" placeholder="assets/notes/sermon.pdf"
                 class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400">
        </div>
        <div class="flex items-center gap-3 pt-6">
          <input id="f-published" type="checkbox" class="w-4 h-4 accent-amber-500">
          <label for="f-published" class="text-sm font-medium text-gray-700">Published (visible to public)</label>
        </div>
      </div>
      <div class="flex gap-3 mt-6">
        <button onclick="saveSermon()"
                class="bg-amber-500 hover:bg-amber-600 text-white px-8 py-3 rounded-full text-sm font-medium transition-all">
          Save Sermon
        </button>
        <button onclick="closeForm()"
                class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-8 py-3 rounded-full text-sm font-medium transition-all">
          Cancel
        </button>
      </div>
    </div>
  </div>

  <!-- SERMON LIST -->
  <main class="max-w-7xl mx-auto px-6 py-10">
    <div id="sermon-list" class="space-y-4">
      <div class="text-center py-12 text-gray-400">
        <i class="fas fa-spinner fa-spin text-3xl mb-3"></i>
        <p>Loading sermons...</p>
      </div>
    </div>
  </main>

  <script src="/firebase-config.js"></script>
  <script src="/js/main.js"></script>
  <script src="/js/admin-auth.js"></script>
  <script>
    const db = firebase.firestore();
    let editingId = null;

    function openForm(sermon = null, id = null) {
      editingId = id;
      document.getElementById('form-title').textContent = id ? 'Edit Sermon' : 'Add New Sermon';
      document.getElementById('f-title').value = sermon?.title || '';
      document.getElementById('f-speaker').value = sermon?.speaker || '';
      document.getElementById('f-date').value = sermon?.date || '';
      document.getElementById('f-duration').value = sermon?.duration || '';
      document.getElementById('f-youtube').value = sermon?.youtubeId || '';
      document.getElementById('f-audio').value = sermon?.audioUrl || '';
      document.getElementById('f-notes').value = sermon?.notesUrl || '';
      document.getElementById('f-published').checked = sermon?.published ?? true;
      document.getElementById('sermon-form').classList.remove('hidden');
      document.getElementById('sermon-form').scrollIntoView({ behavior: 'smooth' });
    }

    function closeForm() {
      editingId = null;
      document.getElementById('sermon-form').classList.add('hidden');
    }

    function saveSermon() {
      const title = document.getElementById('f-title').value.trim();
      const speaker = document.getElementById('f-speaker').value.trim();
      const date = document.getElementById('f-date').value;

      if (!title || !speaker || !date) {
        alert('Title, speaker and date are required.');
        return;
      }

      const data = {
        title,
        speaker,
        date,
        duration: document.getElementById('f-duration').value.trim(),
        youtubeId: document.getElementById('f-youtube').value.trim(),
        audioUrl: document.getElementById('f-audio').value.trim(),
        notesUrl: document.getElementById('f-notes').value.trim(),
        published: document.getElementById('f-published').checked,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
      };

      const ref = editingId
        ? db.collection('sermons').doc(editingId)
        : db.collection('sermons').doc();

      if (!editingId) {
        data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
      }

      ref.set(data, { merge: true })
        .then(() => {
          closeForm();
          loadSermons();
        })
        .catch(err => alert('Error saving sermon: ' + err.message));
    }

    function deleteSermon(id, title) {
      if (!confirm(`Delete "${title}"? This cannot be undone.`)) return;
      db.collection('sermons').doc(id).delete()
        .then(() => loadSermons())
        .catch(err => alert('Error: ' + err.message));
    }

    function loadSermons() {
      const list = document.getElementById('sermon-list');
      list.innerHTML = `<div class="text-center py-12 text-gray-400">
        <i class="fas fa-spinner fa-spin text-3xl mb-3"></i>
        <p>Loading...</p>
      </div>`;

      db.collection('sermons').orderBy('date', 'desc').get()
        .then((snapshot) => {
          if (snapshot.empty) {
            list.innerHTML = `<div class="text-center py-12 text-gray-400">
              <i class="fas fa-bible text-3xl mb-3"></i>
              <p>No sermons yet. Click Add Sermon to get started.</p>
            </div>`;
            return;
          }

          list.innerHTML = '';
          snapshot.forEach(doc => {
            const s = doc.data();
            list.innerHTML += `
              <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-6 flex flex-col md:flex-row md:items-center gap-4">
                <div class="flex-1">
                  <div class="flex items-center gap-2 mb-1">
                    <span class="text-xs px-2 py-1 rounded-full ${s.published ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-500'}">
                      ${s.published ? 'Published' : 'Draft'}
                    </span>
                    <span class="text-xs text-gray-400">${s.date}</span>
                  </div>
                  <p class="font-semibold text-gray-900">${s.title}</p>
                  <p class="text-sm text-gray-500">${s.speaker} ${s.duration ? '· ' + s.duration : ''}</p>
                  ${s.youtubeId ? `<p class="text-xs text-blue-500 mt-1"><i class="fab fa-youtube mr-1"></i>${s.youtubeId}</p>` : ''}
                </div>
                <div class="flex gap-2">
                  <button onclick='openForm(${JSON.stringify(s)}, "${doc.id}")'
                          class="bg-blue-50 hover:bg-blue-100 text-blue-600 text-sm px-4 py-2 rounded-full transition">
                    <i class="fas fa-edit mr-1"></i>Edit
                  </button>
                  <button onclick='deleteSermon("${doc.id}", "${s.title}")'
                          class="bg-red-50 hover:bg-red-100 text-red-600 text-sm px-4 py-2 rounded-full transition">
                    <i class="fas fa-trash mr-1"></i>Delete
                  </button>
                </div>
              </div>`;
          });
        })
        .catch(err => {
          list.innerHTML = `<div class="text-center py-12 text-red-400"><p>Error loading sermons.</p></div>`;
        });
    }

    document.addEventListener('DOMContentLoaded', () => loadSermons());
  </script>
</body>
</html>
