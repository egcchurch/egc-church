<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0A3D62">
  <title>Blog Management | EGC Admin</title>

  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>
<body class="bg-zinc-50 font-sans overflow-x-hidden">

  <!-- Navigation (shared — see admin-nav.html, injected by js/nav.js) -->
  <div id="nav-placeholder"></div>

  <!-- PAGE HEADER -->
  <div class="bg-[#0A3D62] text-white py-10 px-6">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
      <div>
        <h1 class="text-3xl font-bold tracking-tight">Blog Management</h1>
        <p class="text-blue-200 mt-1">Add and manage announcements and news posts</p>
      </div>
      <button onclick="openForm()"
              class="bg-amber-500 hover:bg-amber-600 text-white px-6 py-2.5 rounded-full text-sm font-medium transition-all">
        <i class="fas fa-plus mr-2"></i>Add Post
      </button>
    </div>
  </div>

  <!-- ADD/EDIT FORM -->
  <div id="post-form" class="hidden bg-white border-b shadow-sm">
    <div class="max-w-7xl mx-auto px-6 py-8">
      <h2 class="text-xl font-bold text-[#0A3D62] mb-6" id="form-title">Add New Post</h2>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

        <!-- Kind -->
        <div class="md:col-span-2">
          <label class="block text-sm font-medium text-gray-700 mb-2">Type *</label>
          <div class="flex flex-col sm:flex-row gap-3">
            <label class="flex items-start gap-2 cursor-pointer">
              <input type="radio" name="f-kind" id="f-kind-announcement" value="announcement" class="mt-0.5 accent-amber-500">
              <span class="text-sm">
                <span class="font-medium text-gray-800">Announcement</span>
                <span class="text-gray-500"> — short, time-sensitive; appears on the member home feed</span>
              </span>
            </label>
            <label class="flex items-start gap-2 cursor-pointer">
              <input type="radio" name="f-kind" id="f-kind-article" value="article" class="mt-0.5 accent-amber-500" checked>
              <span class="text-sm">
                <span class="font-medium text-gray-800">Article</span>
                <span class="text-gray-500"> — longer-form; appears on /blog only</span>
              </span>
            </label>
          </div>
        </div>

        <!-- Title -->
        <div class="md:col-span-2">
          <label class="block text-sm font-medium text-gray-700 mb-1">Title *</label>
          <input id="f-title" type="text" placeholder="Post title"
                 class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400">
        </div>

        <!-- Body -->
        <div class="md:col-span-2">
          <label class="block text-sm font-medium text-gray-700 mb-1">Body</label>
          <textarea id="f-body" rows="6" placeholder="Write the announcement..."
                    class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400 resize-none"></textarea>
        </div>

        <!-- Author -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Author</label>
          <input id="f-author" type="text" placeholder="e.g. Pastor John"
                 class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400">
        </div>

        <!-- Publish Date -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Publish Date *</label>
          <input id="f-publish-date" type="date"
                 class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400">
        </div>

        <!-- Image URL -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Image URL (optional)</label>
          <input id="f-image-url" type="text" placeholder="https://..."
                 class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400">
        </div>

        <!-- Published toggle -->
        <div class="flex items-center gap-3 pt-6">
          <input id="f-published" type="checkbox" class="w-4 h-4 accent-amber-500">
          <label for="f-published" class="text-sm font-medium text-gray-700">Published (visible on site)</label>
        </div>

      </div>
      <div class="flex gap-3 mt-6">
        <button onclick="savePost()"
                class="bg-amber-500 hover:bg-amber-600 text-white px-8 py-3 rounded-full text-sm font-medium transition-all">
          Save Post
        </button>
        <button onclick="closeForm()"
                class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-8 py-3 rounded-full text-sm font-medium transition-all">
          Cancel
        </button>
      </div>
    </div>
  </div>

  <!-- POST LIST -->
  <main class="max-w-7xl mx-auto px-6 py-10">
    <div id="post-list" class="space-y-4">
      <div class="text-center py-12 text-gray-400">
        <i class="fas fa-spinner fa-spin text-3xl mb-3"></i>
        <p>Loading posts...</p>
      </div>
    </div>
  </main>

  <!-- TOAST -->
  <div id="toast"
       class="fixed bottom-6 right-6 z-50 hidden px-6 py-3 rounded-2xl text-white text-sm font-medium shadow-lg transition-all">
  </div>

  <script src="/firebase-config.js"></script>
  <script src="/js/nav.js"></script>
  <script src="/js/main.js"></script>
  <script src="/js/permissions.js"></script>
  <script src="/js/admin-auth.js" data-require-perm="blog.manage"></script>
  <script>
    const db = firebase.firestore();
    let editingId = null;
    const postsCache = {};

    // ─── Toast ───────────────────────────────────────────────────────────────────
    function showToast(message, type) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = 'fixed bottom-6 right-6 z-50 px-6 py-3 rounded-2xl text-white text-sm font-medium shadow-lg transition-all '
        + (type === 'error' ? 'bg-red-600' : 'bg-green-600');
      setTimeout(() => toast.classList.add('hidden'), 3000);
    }

    // ─── Form ─────────────────────────────────────────────────────────────────
    function openForm(id) {
      editingId = id || null;
      const post = id ? postsCache[id] : null;

      document.getElementById('form-title').textContent = id ? 'Edit Post' : 'Add New Post';
      document.getElementById('f-title').value     = post?.title    || '';
      document.getElementById('f-body').value      = post?.body     || '';
      document.getElementById('f-author').value    = post?.author   || '';
      document.getElementById('f-image-url').value = post?.imageUrl || '';
      document.getElementById('f-published').checked = post?.published ?? true;
      const kind = post?.kind || 'article';
      document.querySelector(`input[name="f-kind"][value="${kind}"]`).checked = true;

      const { date } = splitTimestamp(post?.publishedAt);
      document.getElementById('f-publish-date').value = date || today();

      document.getElementById('post-form').classList.remove('hidden');
      document.getElementById('post-form').scrollIntoView({ behavior: 'smooth' });
    }

    function closeForm() {
      editingId = null;
      document.getElementById('post-form').classList.add('hidden');
    }

    function savePost() {
      const title       = document.getElementById('f-title').value.trim();
      const publishDate = document.getElementById('f-publish-date').value;

      if (!title || !publishDate) {
        showToast('Title and publish date are required.', 'error');
        return;
      }

      const data = {
        title,
        body        : document.getElementById('f-body').value.trim(),
        author      : document.getElementById('f-author').value.trim(),
        imageUrl    : document.getElementById('f-image-url').value.trim() || null,
        published   : document.getElementById('f-published').checked,
        kind        : document.querySelector('input[name="f-kind"]:checked').value,
        publishedAt : buildTimestamp(publishDate),
        updatedAt   : firebase.firestore.FieldValue.serverTimestamp(),
      };

      const ref = editingId
        ? db.collection('blog').doc(editingId)
        : db.collection('blog').doc();

      if (!editingId) {
        data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
      }

      ref.set(data, { merge: true })
        .then(() => {
          closeForm();
          showToast('Post saved.', 'success');
          loadPosts();
        })
        .catch(err => showToast('Error saving post: ' + err.message, 'error'));
    }

    function deletePost(id, title) {
      if (!confirm('Delete "' + title + '"? This cannot be undone.')) return;
      db.collection('blog').doc(id).delete()
        .then(() => {
          showToast('Post deleted.', 'success');
          loadPosts();
        })
        .catch(err => showToast('Error: ' + err.message, 'error'));
    }

    // ─── List ─────────────────────────────────────────────────────────────────
    function loadPosts() {
      const list = document.getElementById('post-list');
      list.innerHTML = `<div class="text-center py-12 text-gray-400">
        <i class="fas fa-spinner fa-spin text-3xl mb-3"></i><p>Loading...</p>
      </div>`;

      db.collection('blog').orderBy('publishedAt', 'desc').get()
        .then((snapshot) => {
          if (snapshot.empty) {
            list.innerHTML = `<div class="text-center py-12 text-gray-400">
              <i class="fas fa-newspaper text-3xl mb-3"></i>
              <p>No posts yet. Click Add Post to get started.</p>
            </div>`;
            return;
          }

          list.innerHTML = '';
          snapshot.forEach(doc => {
            const p = doc.data();
            postsCache[doc.id] = p;

            const dateStr  = formatTimestamp(p.publishedAt);
            const pubBadge = p.published
              ? '<span class="text-xs px-2 py-1 rounded-full bg-green-100 text-green-700">Published</span>'
              : '<span class="text-xs px-2 py-1 rounded-full bg-gray-100 text-gray-500">Draft</span>';
            const kindBadge = (p.kind || 'article') === 'announcement'
              ? '<span class="text-xs px-2 py-1 rounded-full bg-amber-100 text-amber-700">Announcement</span>'
              : '<span class="text-xs px-2 py-1 rounded-full bg-blue-100 text-blue-700">Article</span>';

            list.innerHTML += `
              <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-6 flex flex-col md:flex-row md:items-center gap-4">
                <div class="flex-1 min-w-0">
                  <div class="flex flex-wrap items-center gap-2 mb-2">
                    ${pubBadge}
                    ${kindBadge}
                  </div>
                  <p class="font-semibold text-gray-900 truncate">${escHtml(p.title)}</p>
                  <div class="flex flex-wrap gap-x-4 mt-1 text-sm text-gray-500">
                    <span><i class="fas fa-calendar text-amber-400 mr-1"></i>${dateStr}</span>
                    ${p.author ? `<span><i class="fas fa-user text-amber-400 mr-1"></i>${escHtml(p.author)}</span>` : ''}
                  </div>
                </div>
                <div class="flex gap-2 shrink-0">
                  <button onclick="openForm('${doc.id}')"
                          class="bg-blue-50 hover:bg-blue-100 text-blue-600 text-sm px-4 py-2 rounded-full transition">
                    <i class="fas fa-edit mr-1"></i>Edit
                  </button>
                  <button onclick="deletePost('${doc.id}', '${escAttr(p.title)}')"
                          class="bg-red-50 hover:bg-red-100 text-red-600 text-sm px-4 py-2 rounded-full transition">
                    <i class="fas fa-trash mr-1"></i>Delete
                  </button>
                </div>
              </div>`;
          });
        })
        .catch(() => {
          list.innerHTML = `<div class="text-center py-12 text-red-400"><p>Error loading posts.</p></div>`;
        });
    }

    // ─── Helpers ──────────────────────────────────────────────────────────────

    function today() {
      return new Date().toISOString().slice(0, 10);
    }

    function buildTimestamp(dateStr) {
      return firebase.firestore.Timestamp.fromDate(new Date(dateStr + 'T00:00:00'));
    }

    function splitTimestamp(ts) {
      if (!ts) return { date: '' };
      const d = typeof ts.toDate === 'function' ? ts.toDate() : new Date(ts);
      return { date: d.toISOString().slice(0, 10) };
    }

    function formatTimestamp(ts) {
      if (!ts) return '—';
      const d = typeof ts.toDate === 'function' ? ts.toDate() : new Date(ts);
      return d.toLocaleDateString('en-ZA', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' });
    }

    function escHtml(str) {
      return String(str || '')
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function escAttr(str) {
      return String(str || '').replace(/'/g, "\\'").replace(/"/g, '&quot;');
    }

    document.addEventListener('DOMContentLoaded', () => loadPosts());
  </script>
</body>
</html>
