<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0A3D62">
  <title>Team Management | EGC Admin</title>

  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
  <link rel="stylesheet" href="/assets/css/tailwind.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>
<body class="bg-zinc-50 font-sans overflow-x-hidden">

  <!-- Navigation (shared — see admin-nav.html, injected by js/nav.js) -->
  <div id="nav-placeholder" class="contents"></div>

  <!-- PAGE HEADER -->
  <div class="bg-[#0A3D62] text-white py-10 px-6">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
      <div>
        <h1 class="text-3xl font-bold tracking-tight">Team Management</h1>
        <p class="text-blue-200 mt-1">Add and manage leadership team profiles</p>
      </div>
      <button onclick="openForm()"
              class="bg-amber-500 hover:bg-amber-600 text-white px-6 py-2.5 rounded-full text-sm font-medium transition-all">
        <i class="fas fa-plus mr-2"></i>Add Member
      </button>
    </div>
  </div>

  <!-- ADD/EDIT FORM -->
  <div id="member-form" class="hidden bg-white border-b shadow-sm">
    <div class="max-w-7xl mx-auto px-6 py-8">
      <h2 class="text-xl font-bold text-[#0A3D62] mb-6" id="form-title">Add New Member</h2>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

        <!-- Name -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Name *</label>
          <input id="f-name" type="text" placeholder="Full name"
                 class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400">
        </div>

        <!-- Role -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Role</label>
          <input id="f-role" type="text" placeholder="e.g. Senior Pastor"
                 class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400">
        </div>

        <!-- Bio -->
        <div class="md:col-span-2">
          <label class="block text-sm font-medium text-gray-700 mb-1">Bio</label>
          <textarea id="f-bio" rows="4" placeholder="Short biography..."
                    class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400 resize-none"></textarea>
        </div>

        <!-- Photo URL -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Photo URL (optional)</label>
          <input id="f-photo-url" type="text" placeholder="https://..."
                 class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400">
        </div>

        <!-- Order -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Sort Order</label>
          <input id="f-order" type="number" min="0" step="1" placeholder="0"
                 class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400">
          <p class="text-xs text-gray-400 mt-1">Lower numbers appear first.</p>
        </div>

      </div>
      <div class="flex gap-3 mt-6">
        <button onclick="saveMember()"
                class="bg-amber-500 hover:bg-amber-600 text-white px-8 py-3 rounded-full text-sm font-medium transition-all">
          Save Member
        </button>
        <button onclick="closeForm()"
                class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-8 py-3 rounded-full text-sm font-medium transition-all">
          Cancel
        </button>
      </div>
    </div>
  </div>

  <!-- MEMBER LIST -->
  <main class="max-w-7xl mx-auto px-6 py-10">
    <div id="member-list" class="space-y-4">
      <div class="text-center py-12 text-gray-400">
        <i class="fas fa-spinner fa-spin text-3xl mb-3"></i>
        <p>Loading team...</p>
      </div>
    </div>
  </main>

  <!-- TOAST -->
  <div id="toast"
       class="fixed bottom-6 right-6 z-50 hidden px-6 py-3 rounded-2xl text-white text-sm font-medium shadow-lg transition-all">
  </div>

  <script src="/firebase-config.js"></script>
  <script src="/js/nav.js"></script>
  <script src="/js/main.js"></script>
  <script src="/js/permissions.js"></script>
  <script src="/js/admin-auth.js" data-require-perm="team.manage"></script>
  <script>
    const db = firebase.firestore();
    let editingId = null;
    const membersCache = {};

    // ─── Toast ───────────────────────────────────────────────────────────────────
    function showToast(message, type) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = 'fixed bottom-6 right-6 z-50 px-6 py-3 rounded-2xl text-white text-sm font-medium shadow-lg transition-all '
        + (type === 'error' ? 'bg-red-600' : 'bg-green-600');
      setTimeout(() => toast.classList.add('hidden'), 3000);
    }

    // ─── Form ─────────────────────────────────────────────────────────────────
    function openForm(id) {
      editingId = id || null;
      const member = id ? membersCache[id] : null;

      document.getElementById('form-title').textContent = id ? 'Edit Member' : 'Add New Member';
      document.getElementById('f-name').value      = member?.name     || '';
      document.getElementById('f-role').value      = member?.role     || '';
      document.getElementById('f-bio').value       = member?.bio      || '';
      document.getElementById('f-photo-url').value = member?.photoUrl || '';
      document.getElementById('f-order').value     = member?.order ?? '';

      document.getElementById('member-form').classList.remove('hidden');
      document.getElementById('member-form').scrollIntoView({ behavior: 'smooth' });
    }

    function closeForm() {
      editingId = null;
      document.getElementById('member-form').classList.add('hidden');
    }

    function saveMember() {
      const name = document.getElementById('f-name').value.trim();

      if (!name) {
        showToast('Name is required.', 'error');
        return;
      }

      const orderVal = document.getElementById('f-order').value;

      const data = {
        name,
        role      : document.getElementById('f-role').value.trim(),
        bio       : document.getElementById('f-bio').value.trim(),
        photoUrl  : document.getElementById('f-photo-url').value.trim() || null,
        order     : orderVal === '' ? 0 : parseInt(orderVal, 10),
        updatedAt : firebase.firestore.FieldValue.serverTimestamp(),
      };

      const ref = editingId
        ? db.collection('team').doc(editingId)
        : db.collection('team').doc();

      if (!editingId) {
        data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
      }

      ref.set(data, { merge: true })
        .then(() => {
          closeForm();
          showToast('Team member saved.', 'success');
          loadMembers();
        })
        .catch(err => showToast('Error saving member: ' + err.message, 'error'));
    }

    function deleteMember(id, name) {
      if (!confirm('Delete "' + name + '"? This cannot be undone.')) return;
      db.collection('team').doc(id).delete()
        .then(() => {
          showToast('Team member deleted.', 'success');
          loadMembers();
        })
        .catch(err => showToast('Error: ' + err.message, 'error'));
    }

    // ─── List ─────────────────────────────────────────────────────────────────
    function loadMembers() {
      const list = document.getElementById('member-list');
      list.innerHTML = `<div class="text-center py-12 text-gray-400">
        <i class="fas fa-spinner fa-spin text-3xl mb-3"></i><p>Loading...</p>
      </div>`;

      db.collection('team').orderBy('order', 'asc').get()
        .then((snapshot) => {
          if (snapshot.empty) {
            list.innerHTML = `<div class="text-center py-12 text-gray-400">
              <i class="fas fa-users text-3xl mb-3"></i>
              <p>No team members yet. Click Add Member to get started.</p>
            </div>`;
            return;
          }

          list.innerHTML = '';
          snapshot.forEach(doc => {
            const m = doc.data();
            membersCache[doc.id] = m;

            const avatar = m.photoUrl
              ? `<img src="${m.photoUrl}" alt="${escAttr(m.name)}" class="w-14 h-14 rounded-full object-cover shrink-0">`
              : `<div class="w-14 h-14 rounded-full bg-gradient-to-br from-[#0A3D62] to-amber-500 flex items-center justify-center shrink-0">
                   <i class="fas fa-user text-white"></i>
                 </div>`;

            list.innerHTML += `
              <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-6 flex flex-col md:flex-row md:items-center gap-4">
                ${avatar}
                <div class="flex-1 min-w-0">
                  <div class="flex flex-wrap items-center gap-2 mb-1">
                    <span class="text-xs px-2 py-1 rounded-full bg-gray-100 text-gray-600">Order ${Number.isFinite(m.order) ? m.order : 0}</span>
                  </div>
                  <p class="font-semibold text-gray-900 truncate">${escHtml(m.name)}</p>
                  ${m.role ? `<p class="text-sm text-amber-600">${escHtml(m.role)}</p>` : ''}
                </div>
                <div class="flex gap-2 shrink-0">
                  <button onclick="openForm('${doc.id}')"
                          class="bg-blue-50 hover:bg-blue-100 text-blue-600 text-sm px-4 py-2 rounded-full transition">
                    <i class="fas fa-edit mr-1"></i>Edit
                  </button>
                  <button onclick="deleteMember('${doc.id}', '${escAttr(m.name)}')"
                          class="bg-red-50 hover:bg-red-100 text-red-600 text-sm px-4 py-2 rounded-full transition">
                    <i class="fas fa-trash mr-1"></i>Delete
                  </button>
                </div>
              </div>`;
          });
        })
        .catch(() => {
          list.innerHTML = `<div class="text-center py-12 text-red-400"><p>Error loading team.</p></div>`;
        });
    }

    // ─── Helpers ──────────────────────────────────────────────────────────────

    function escHtml(str) {
      return String(str || '')
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function escAttr(str) {
      return String(str || '').replace(/'/g, "\\'").replace(/"/g, '&quot;');
    }

    document.addEventListener('DOMContentLoaded', () => loadMembers());
  </script>
</body>
</html>
