<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0A3D62">
  <title>Sermon Series | EGC Admin</title>

  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>
<body class="bg-zinc-50 font-sans overflow-x-hidden">

  <div id="nav-placeholder"></div>

  <!-- PAGE HEADER -->
  <div class="bg-[#0A3D62] text-white py-10 px-6">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
      <div>
        <h1 class="text-3xl font-bold tracking-tight">Sermon Series</h1>
        <p class="text-blue-200 mt-1">Group sermons into named series or playlists</p>
      </div>
      <button onclick="openForm()"
              class="bg-amber-500 hover:bg-amber-600 text-white px-6 py-2.5 rounded-full text-sm font-medium transition-all">
        <i class="fas fa-plus mr-2"></i>New Series
      </button>
    </div>
  </div>

  <!-- ADD/EDIT FORM -->
  <div id="series-form" class="hidden bg-white border-b shadow-sm">
    <div class="max-w-2xl mx-auto px-6 py-8">
      <h2 class="text-xl font-bold text-[#0A3D62] mb-6" id="form-title">New Series</h2>
      <div class="space-y-5">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Title *</label>
          <input id="f-title" type="text" placeholder="e.g. Foundations of Faith"
                 class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
          <textarea id="f-description" rows="3" placeholder="Brief description of this series..."
                    class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400 resize-none"></textarea>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Cover Image URL</label>
          <input id="f-image" type="text" placeholder="https://..."
                 class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Sort Order</label>
          <input id="f-order" type="number" placeholder="0" min="0"
                 class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400">
        </div>
        <div class="flex items-center gap-3">
          <input id="f-published" type="checkbox" class="w-4 h-4 accent-amber-500" checked>
          <label for="f-published" class="text-sm font-medium text-gray-700">Published (visible on sermons page)</label>
        </div>
        <div class="flex gap-3 pt-2">
          <button onclick="saveSeries()"
                  class="bg-amber-500 hover:bg-amber-600 text-white px-6 py-2.5 rounded-full text-sm font-medium transition-all">
            Save Series
          </button>
          <button onclick="closeForm()"
                  class="border border-zinc-200 hover:border-zinc-300 text-zinc-600 px-6 py-2.5 rounded-full text-sm font-medium transition-all">
            Cancel
          </button>
        </div>
        <p id="form-msg" class="hidden text-sm font-medium"></p>
      </div>
    </div>
  </div>

  <!-- SERIES LIST -->
  <main class="max-w-7xl mx-auto px-6 py-8">
    <div id="loading" class="text-center py-16 text-zinc-400">
      <i class="fas fa-spinner fa-spin text-3xl mb-3"></i>
      <p>Loading series...</p>
    </div>
    <div id="empty" class="hidden text-center py-16 text-zinc-400">
      <i class="fas fa-layer-group text-5xl mb-4 opacity-30"></i>
      <p class="text-lg font-medium">No series yet</p>
      <p class="text-sm mt-1">Click "New Series" to create your first one.</p>
    </div>
    <div id="series-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
  </main>

  <!-- TOAST -->
  <div id="toast" class="fixed bottom-6 right-6 z-50 hidden px-6 py-3 rounded-2xl text-white text-sm font-medium shadow-lg"></div>

  <script src="/firebase-config.js"></script>
  <script src="/js/nav.js"></script>
  <script src="/js/main.js"></script>
  <script src="/js/permissions.js"></script>
  <script src="/js/admin-auth.js" data-require-perm="sermons.manage"></script>
  <script>
    const db = firebase.firestore();
    let editingId = null;
    const seriesCache = {};

    function showToast(msg, type) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'fixed bottom-6 right-6 z-50 px-6 py-3 rounded-2xl text-white text-sm font-medium shadow-lg '
        + (type === 'error' ? 'bg-red-600' : 'bg-green-600');
      setTimeout(() => t.classList.add('hidden'), 3000);
    }

    function openForm(id) {
      editingId = id || null;
      const s = id ? seriesCache[id] : null;
      document.getElementById('form-title').textContent = id ? 'Edit Series' : 'New Series';
      document.getElementById('f-title').value       = s?.title       || '';
      document.getElementById('f-description').value = s?.description || '';
      document.getElementById('f-image').value       = s?.imageUrl    || '';
      document.getElementById('f-order').value       = s?.order != null ? s.order : 0;
      document.getElementById('f-published').checked = s?.published   ?? true;
      document.getElementById('form-msg').classList.add('hidden');
      document.getElementById('series-form').classList.remove('hidden');
      document.getElementById('series-form').scrollIntoView({ behavior: 'smooth' });
    }

    function closeForm() {
      editingId = null;
      document.getElementById('series-form').classList.add('hidden');
    }

    async function saveSeries() {
      const title = document.getElementById('f-title').value.trim();
      const msg   = document.getElementById('form-msg');
      if (!title) {
        msg.textContent = 'Title is required.';
        msg.className = 'text-sm font-medium text-red-500';
        msg.classList.remove('hidden');
        return;
      }
      const data = {
        title,
        description : document.getElementById('f-description').value.trim(),
        imageUrl    : document.getElementById('f-image').value.trim() || null,
        order       : parseInt(document.getElementById('f-order').value, 10) || 0,
        published   : document.getElementById('f-published').checked,
        updatedAt   : firebase.firestore.FieldValue.serverTimestamp(),
      };
      if (!editingId) data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
      const ref = editingId ? db.collection('series').doc(editingId) : db.collection('series').doc();
      try {
        await ref.set(data, { merge: true });
        closeForm();
        showToast('Series saved.', 'success');
        loadSeries();
      } catch (err) {
        showToast('Error: ' + err.message, 'error');
      }
    }

    function deleteSeries(id, title) {
      if (!confirm('Delete "' + title + '"? Sermons in this series will not be deleted.')) return;
      db.collection('series').doc(id).delete()
        .then(() => { showToast('Series deleted.', 'success'); loadSeries(); })
        .catch(err => showToast('Error: ' + err.message, 'error'));
    }

    function escHtml(str) {
      return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function loadSeries() {
      const list = document.getElementById('series-list');
      list.innerHTML = '';
      document.getElementById('loading').classList.remove('hidden');
      document.getElementById('empty').classList.add('hidden');

      db.collection('series').orderBy('order').orderBy('title').get()
        .then(snap => {
          document.getElementById('loading').classList.add('hidden');
          if (snap.empty) { document.getElementById('empty').classList.remove('hidden'); return; }

          snap.forEach(doc => {
            const s = doc.data();
            seriesCache[doc.id] = s;
            const pubBadge = s.published
              ? '<span class="text-xs px-2 py-1 rounded-full bg-green-100 text-green-700">Published</span>'
              : '<span class="text-xs px-2 py-1 rounded-full bg-gray-100 text-gray-500">Draft</span>';
            const thumb = s.imageUrl
              ? `<img src="${escHtml(s.imageUrl)}" class="w-full h-36 object-cover" alt="">`
              : `<div class="w-full h-36 bg-gradient-to-br from-[#0A3D62] to-amber-500 flex items-center justify-center">
                   <i class="fas fa-layer-group text-white text-3xl opacity-60"></i>
                 </div>`;
            list.innerHTML += `
              <div class="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
                ${thumb}
                <div class="p-5">
                  <div class="flex items-center gap-2 mb-2">${pubBadge}
                    <span class="text-xs text-zinc-400">Order: ${s.order || 0}</span>
                  </div>
                  <p class="font-semibold text-gray-900 mb-1">${escHtml(s.title)}</p>
                  ${s.description ? `<p class="text-sm text-gray-500 line-clamp-2 mb-4">${escHtml(s.description)}</p>` : '<div class="mb-4"></div>'}
                  <div class="flex gap-2">
                    <button onclick="openForm('${doc.id}')"
                            class="flex-1 bg-blue-50 hover:bg-blue-100 text-blue-600 text-sm px-3 py-2 rounded-full transition text-center">
                      <i class="fas fa-edit mr-1"></i>Edit
                    </button>
                    <button onclick="deleteSeries('${doc.id}', '${escHtml(s.title).replace(/'/g, "\\'")}')"
                            class="flex-1 bg-red-50 hover:bg-red-100 text-red-600 text-sm px-3 py-2 rounded-full transition text-center">
                      <i class="fas fa-trash mr-1"></i>Delete
                    </button>
                  </div>
                </div>
              </div>`;
          });
        })
        .catch(err => {
          document.getElementById('loading').classList.add('hidden');
          showToast('Failed to load series.', 'error');
        });
    }

    document.addEventListener('DOMContentLoaded', () => loadSeries());
  </script>
</body>
</html>
