<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0A3D62">
  <title>Connect Submissions | EGC Admin</title>

  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>
<body class="bg-zinc-50 font-sans overflow-x-hidden">

  <!-- Navigation (shared — see admin-nav.html, injected by js/nav.js) -->
  <div id="nav-placeholder"></div>

  <!-- PAGE HEADER -->
  <div class="bg-[#0A3D62] text-white py-10 px-6">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
      <div>
        <h1 class="text-3xl font-bold tracking-tight">Connect Submissions</h1>
        <p class="text-blue-200 mt-1">Messages from the public connect form</p>
      </div>
      <button onclick="loadSubmissions()"
              class="bg-amber-500 hover:bg-amber-600 text-white px-6 py-2.5 rounded-full text-sm font-medium transition-all">
        <i class="fas fa-rotate-right mr-2"></i>Refresh
      </button>
    </div>
  </div>

  <!-- SUBMISSION LIST -->
  <main class="max-w-7xl mx-auto px-6 py-10">
    <div id="submission-list" class="space-y-4">
      <div class="text-center py-12 text-gray-400">
        <i class="fas fa-spinner fa-spin text-3xl mb-3"></i>
        <p>Loading submissions...</p>
      </div>
    </div>
  </main>

  <!-- TOAST -->
  <div id="toast"
       class="fixed bottom-6 right-6 z-50 hidden px-6 py-3 rounded-2xl text-white text-sm font-medium shadow-lg transition-all">
  </div>

  <script src="/firebase-config.js"></script>
  <script src="/js/nav.js"></script>
  <script src="/js/main.js"></script>
  <script src="/js/admin-auth.js"></script>
  <script>
    const db = firebase.firestore();

    // ─── Toast ───────────────────────────────────────────────────────────────────
    function showToast(message, type) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = 'fixed bottom-6 right-6 z-50 px-6 py-3 rounded-2xl text-white text-sm font-medium shadow-lg transition-all '
        + (type === 'error' ? 'bg-red-600' : 'bg-green-600');
      setTimeout(() => toast.classList.add('hidden'), 3000);
    }

    // ─── List ─────────────────────────────────────────────────────────────────
    function loadSubmissions() {
      const list = document.getElementById('submission-list');
      list.innerHTML = `<div class="text-center py-12 text-gray-400">
        <i class="fas fa-spinner fa-spin text-3xl mb-3"></i><p>Loading...</p>
      </div>`;

      db.collection('connect').orderBy('submittedAt', 'desc').get()
        .then((snapshot) => {
          if (snapshot.empty) {
            list.innerHTML = `<div class="text-center py-12 text-gray-400">
              <i class="fas fa-inbox text-3xl mb-3"></i>
              <p>No submissions yet.</p>
            </div>`;
            return;
          }

          list.innerHTML = '';
          snapshot.forEach(doc => {
            const s = doc.data();
            const dateStr = formatTimestamp(s.submittedAt);
            const unread = !s.read;

            const card = document.createElement('div');
            card.className = 'bg-white rounded-2xl border shadow-sm p-6 '
              + (unread ? 'border-amber-300 ring-1 ring-amber-200' : 'border-gray-100');

            card.innerHTML = `
              <div class="flex flex-col md:flex-row md:items-start md:justify-between gap-4">
                <div class="flex-1 min-w-0">
                  <div class="flex flex-wrap items-center gap-2 mb-2">
                    ${unread
                      ? '<span class="text-xs px-2 py-1 rounded-full bg-amber-100 text-amber-700 font-medium">Unread</span>'
                      : '<span class="text-xs px-2 py-1 rounded-full bg-gray-100 text-gray-500">Read</span>'}
                    <span class="text-xs text-gray-400">${dateStr}</span>
                  </div>
                  <p class="font-semibold text-gray-900">${escHtml(s.name)}</p>
                  <div class="flex flex-wrap gap-x-4 mt-1 text-sm text-gray-500">
                    <a href="mailto:${escAttr(s.email)}" class="hover:text-amber-600"><i class="fas fa-envelope text-amber-400 mr-1"></i>${escHtml(s.email)}</a>
                    ${s.phone ? `<a href="tel:${escAttr(s.phone)}" class="hover:text-amber-600"><i class="fas fa-phone text-amber-400 mr-1"></i>${escHtml(s.phone)}</a>` : ''}
                  </div>
                  <p class="mt-3 text-sm text-gray-700 whitespace-pre-line">${escHtml(s.message)}</p>
                </div>
                <div class="flex gap-2 shrink-0">
                  ${unread
                    ? `<button data-action="read" class="bg-green-50 hover:bg-green-100 text-green-700 text-sm px-4 py-2 rounded-full transition">
                         <i class="fas fa-check mr-1"></i>Mark read
                       </button>`
                    : ''}
                  <button data-action="delete" class="bg-red-50 hover:bg-red-100 text-red-600 text-sm px-4 py-2 rounded-full transition">
                    <i class="fas fa-trash mr-1"></i>Delete
                  </button>
                </div>
              </div>`;

            const readBtn = card.querySelector('[data-action="read"]');
            if (readBtn) readBtn.addEventListener('click', () => markRead(doc.id));
            card.querySelector('[data-action="delete"]').addEventListener('click', () => deleteSubmission(doc.id, s.name));

            list.appendChild(card);
          });
        })
        .catch((err) => {
          list.innerHTML = `<div class="text-center py-12 text-red-400"><p>Error loading submissions.</p></div>`;
          console.error(err);
        });
    }

    function markRead(id) {
      db.collection('connect').doc(id).update({ read: true })
        .then(() => {
          showToast('Marked as read.', 'success');
          loadSubmissions();
        })
        .catch(err => showToast('Error: ' + err.message, 'error'));
    }

    function deleteSubmission(id, name) {
      if (!confirm('Delete the submission from "' + name + '"? This cannot be undone.')) return;
      db.collection('connect').doc(id).delete()
        .then(() => {
          showToast('Submission deleted.', 'success');
          loadSubmissions();
        })
        .catch(err => showToast('Error: ' + err.message, 'error'));
    }

    // ─── Helpers ──────────────────────────────────────────────────────────────

    function formatTimestamp(ts) {
      if (!ts) return '—';
      const d = typeof ts.toDate === 'function' ? ts.toDate() : new Date(ts);
      return d.toLocaleString('en-ZA', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
    }

    function escHtml(str) {
      return String(str || '')
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function escAttr(str) {
      return String(str || '').replace(/"/g, '&quot;');
    }

    document.addEventListener('DOMContentLoaded', () => loadSubmissions());
  </script>
</body>
</html>
