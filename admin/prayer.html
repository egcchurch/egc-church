<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0A3D62">
  <title>Prayer Moderation | EGC Admin</title>

  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
  <link rel="stylesheet" href="/assets/css/tailwind.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="/firebase-config.js"></script>
  <script src="/js/permissions.js"></script>
  <script src="/js/admin-auth.js" data-require-perm="prayer.moderate"></script>
</head>
<body class="bg-zinc-50 font-sans overflow-x-hidden">

  <div id="nav-placeholder" class="contents"></div>

  <!-- PAGE HEADER -->
  <div class="bg-[#0A3D62] text-white py-10 px-6">
    <div class="max-w-7xl mx-auto flex items-start justify-between gap-4 flex-wrap">
      <div>
        <h1 class="text-3xl font-bold tracking-tight">Prayer Moderation</h1>
        <p class="text-blue-200 mt-1">Approve, edit, and manage prayer requests</p>
      </div>
      <div id="pending-badge" class="hidden bg-amber-400 text-[#0A3D62] text-sm font-bold px-4 py-2 rounded-full self-center">
        <i class="fas fa-clock mr-1"></i><span id="pending-count">0</span> pending
      </div>
    </div>
  </div>

  <!-- FILTER TABS -->
  <div class="bg-white border-b px-6">
    <div class="max-w-7xl mx-auto flex gap-6 text-sm font-medium overflow-x-auto">
      <button onclick="setFilter('pending')" id="tab-pending"
              class="py-3 border-b-2 border-amber-500 text-amber-600 transition-colors whitespace-nowrap">
        <i class="fas fa-clock mr-1"></i>Pending
      </button>
      <button onclick="setFilter('all')" id="tab-all"
              class="py-3 border-b-2 border-transparent text-zinc-500 hover:text-zinc-700 transition-colors whitespace-nowrap">All</button>
      <button onclick="setFilter('active')" id="tab-active"
              class="py-3 border-b-2 border-transparent text-zinc-500 hover:text-zinc-700 transition-colors whitespace-nowrap">Active</button>
      <button onclick="setFilter('answered')" id="tab-answered"
              class="py-3 border-b-2 border-transparent text-zinc-500 hover:text-zinc-700 transition-colors whitespace-nowrap">Answered</button>
      <button onclick="setFilter('public')" id="tab-public"
              class="py-3 border-b-2 border-transparent text-zinc-500 hover:text-zinc-700 transition-colors whitespace-nowrap">Public</button>
      <button onclick="setFilter('private')" id="tab-private"
              class="py-3 border-b-2 border-transparent text-zinc-500 hover:text-zinc-700 transition-colors whitespace-nowrap">Private</button>
    </div>
  </div>

  <!-- PRAYER LIST -->
  <main class="max-w-7xl mx-auto px-6 py-8">
    <div id="loading" class="text-center py-16 text-zinc-400">
      <i class="fas fa-spinner fa-spin text-3xl mb-3"></i>
      <p>Loading prayer requests...</p>
    </div>
    <div id="empty" class="hidden text-center py-16 text-zinc-400">
      <i class="fas fa-hands-praying text-5xl mb-4 opacity-30"></i>
      <p class="text-lg font-medium">No prayer requests</p>
    </div>
    <div id="prayer-list" class="space-y-4"></div>
  </main>

  <script src="/js/nav.js"></script>
  <script src="/js/main.js"></script>
  <script>
    const db = firebase.firestore();
    let currentFilter = 'pending';
    let allRequests = [];

    const FILTER_IDS = ['pending', 'all', 'active', 'answered', 'public', 'private'];

    function setFilter(filter) {
      currentFilter = filter;
      FILTER_IDS.forEach((f) => {
        const tab = document.getElementById('tab-' + f);
        if (f === filter) {
          tab.classList.add('border-amber-500', 'text-amber-600');
          tab.classList.remove('border-transparent', 'text-zinc-500', 'hover:text-zinc-700');
        } else {
          tab.classList.remove('border-amber-500', 'text-amber-600');
          tab.classList.add('border-transparent', 'text-zinc-500', 'hover:text-zinc-700');
        }
      });
      renderList();
    }

    function renderList() {
      const list  = document.getElementById('prayer-list');
      const empty = document.getElementById('empty');
      list.innerHTML = '';

      // Update pending badge
      const pendingCount = allRequests.filter((r) => !r.approved).length;
      const badge = document.getElementById('pending-badge');
      document.getElementById('pending-count').textContent = pendingCount;
      badge.classList.toggle('hidden', pendingCount === 0);

      let filtered = allRequests;
      if (currentFilter === 'pending')  filtered = allRequests.filter((r) => !r.approved);
      if (currentFilter === 'active')   filtered = allRequests.filter((r) => r.approved && (r.status || 'active') === 'active');
      if (currentFilter === 'answered') filtered = allRequests.filter((r) => r.approved && r.status === 'answered');
      if (currentFilter === 'public')   filtered = allRequests.filter((r) => r.approved && !r.isPrivate);
      if (currentFilter === 'private')  filtered = allRequests.filter((r) => r.isPrivate);

      if (filtered.length === 0) {
        empty.classList.remove('hidden');
        return;
      }
      empty.classList.add('hidden');

      filtered.forEach((r) => {
        const isPending     = !r.approved;
        const isAnswered    = r.status === 'answered';
        const prayCount     = (r.prayedFor || []).length;
        const authorDisplay = r.isAnonymous ? 'Anonymous' : (r.authorName || 'Member');
        const date = r.submittedAt?.toDate
          ? r.submittedAt.toDate().toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' })
          : '';

        const pendingBadge = isPending
          ? '<span class="inline-flex items-center gap-1 bg-amber-50 text-amber-600 border border-amber-200 text-xs font-medium px-2.5 py-0.5 rounded-full"><i class="fas fa-clock text-xs"></i>Pending approval</span>'
          : '';

        const answeredBadge = isAnswered
          ? '<span class="inline-flex items-center gap-1 bg-green-100 text-green-700 text-xs font-medium px-2.5 py-0.5 rounded-full"><i class="fas fa-check-circle text-xs"></i>Answered</span>'
          : '';

        const testimonyHtml = isAnswered && r.testimony
          ? `<div class="mt-3 p-3 bg-green-50 border border-green-100 rounded-xl text-sm text-green-800">
               <p class="font-medium text-xs text-green-600 mb-1"><i class="fas fa-quote-left mr-1"></i>Testimony</p>
               <p class="whitespace-pre-wrap">${escapeHtml(r.testimony)}</p>
             </div>`
          : '';

        // Action buttons — differ for pending vs approved
        let actionButtons = '';
        if (isPending) {
          actionButtons = `
            <button onclick="approveRequest('${r.id}')"
                    class="text-xs text-green-600 hover:text-green-700 font-medium border border-green-200 hover:border-green-300 px-3 py-1.5 rounded-full transition-all">
              <i class="fas fa-check mr-1"></i>Approve
            </button>
            <button onclick="showEditApprove('${r.id}')"
                    class="text-xs text-[#0A3D62] hover:text-blue-700 font-medium border border-blue-200 hover:border-blue-300 px-3 py-1.5 rounded-full transition-all">
              <i class="fas fa-pen mr-1"></i>Edit &amp; Approve
            </button>`;
        } else {
          const statusBtn = isAnswered
            ? `<button onclick="setStatus('${r.id}', 'active')"
                       class="text-xs text-zinc-500 hover:text-zinc-700 border border-zinc-200 px-3 py-1.5 rounded-full transition-all">
                 Mark as Active
               </button>`
            : `<button onclick="setStatus('${r.id}', 'answered')"
                       class="text-xs text-green-600 hover:text-green-700 border border-green-200 hover:border-green-300 px-3 py-1.5 rounded-full transition-all">
                 <i class="fas fa-check mr-1"></i>Mark as Answered
               </button>`;
          actionButtons = statusBtn;
        }

        const borderClass = isPending
          ? 'border-amber-200'
          : r.isPrivate ? 'border-purple-200' : (isAnswered ? 'border-green-200' : 'border-zinc-200');

        const card = document.createElement('div');
        card.className = `bg-white rounded-2xl border shadow-sm p-6 ${borderClass}`;
        card.id = 'card-' + r.id;
        card.innerHTML = `
          <div class="flex justify-between items-start gap-4">
            <div class="flex-1 min-w-0">
              <div class="flex flex-wrap gap-2 mb-2">
                ${pendingBadge}
                ${r.isPrivate ? '<span class="inline-block bg-purple-100 text-purple-600 text-xs font-medium px-2 py-0.5 rounded-full">Private</span>' : ''}
                ${answeredBadge}
              </div>
              <p id="body-display-${r.id}" class="text-zinc-700 leading-relaxed whitespace-pre-wrap">${escapeHtml(r.body)}</p>
              ${testimonyHtml}
              <div class="mt-3 flex flex-wrap items-center gap-3 text-xs text-zinc-400">
                <span><i class="fas fa-user mr-1"></i>${escapeHtml(authorDisplay)}</span>
                ${date ? `<span><i class="fas fa-calendar mr-1"></i>${date}</span>` : ''}
                ${r.isAnonymous ? '<span class="bg-zinc-100 px-2 py-0.5 rounded-full">Anonymous</span>' : ''}
                ${!isPending ? `<span><i class="fas fa-hands-praying mr-1"></i>${prayCount} praying</span>` : ''}
              </div>
            </div>
            <button onclick="deleteRequest('${r.id}')"
                    class="text-zinc-300 hover:text-red-500 transition-colors flex-shrink-0" title="Reject / Delete">
              <i class="fas fa-trash"></i>
            </button>
          </div>

          <!-- Edit & Approve inline form -->
          <div id="edit-approve-${r.id}" class="hidden mt-4 space-y-3 border-t border-zinc-100 pt-4">
            <label class="block text-xs font-medium text-zinc-500 mb-1">Edit request text before approving</label>
            <textarea id="edit-body-${r.id}" rows="4"
                      class="w-full border border-zinc-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400 resize-none">${escapeHtml(r.body)}</textarea>
            <div class="flex gap-2 flex-wrap">
              <button onclick="confirmEditApprove('${r.id}')"
                      class="bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded-full text-xs font-medium transition-all">
                <i class="fas fa-check mr-1"></i>Save &amp; Approve
              </button>
              <button onclick="hideEditApprove('${r.id}')"
                      class="border border-zinc-200 text-zinc-500 px-4 py-2 rounded-full text-xs font-medium transition-all">
                Cancel
              </button>
            </div>
          </div>

          <div class="mt-4 flex flex-wrap gap-2">${actionButtons}</div>
        `;
        list.appendChild(card);
      });
    }

    function escapeHtml(str) {
      return String(str || '')
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    async function approveRequest(id) {
      try {
        await db.collection('prayer').doc(id).update({ approved: true });
      } catch (err) {
        console.error('Approve failed:', err);
        alert('Failed to approve. Please try again.');
      }
    }

    function showEditApprove(id) {
      const r = allRequests.find((x) => x.id === id);
      if (!r) return;
      document.getElementById('edit-body-' + id).value = r.body || '';
      document.getElementById('edit-approve-' + id).classList.remove('hidden');
    }

    function hideEditApprove(id) {
      document.getElementById('edit-approve-' + id).classList.add('hidden');
    }

    async function confirmEditApprove(id) {
      const body = document.getElementById('edit-body-' + id).value.trim();
      if (!body) { alert('Body cannot be empty.'); return; }
      try {
        await db.collection('prayer').doc(id).update({ body, approved: true });
      } catch (err) {
        console.error('Edit & approve failed:', err);
        alert('Failed to save. Please try again.');
      }
    }

    async function setStatus(id, status) {
      try {
        await db.collection('prayer').doc(id).update({ status });
      } catch (err) {
        console.error('Status update failed:', err);
        alert('Failed to update. Please try again.');
      }
    }

    async function deleteRequest(id) {
      if (!confirm('Reject and delete this prayer request? This cannot be undone.')) return;
      try {
        await db.collection('prayer').doc(id).delete();
      } catch (err) {
        console.error('Delete failed:', err);
        alert('Failed to delete. Please try again.');
      }
    }

    function loadPrayer() {
      db.collection('prayer')
        .orderBy('submittedAt', 'desc')
        .onSnapshot((snap) => {
          document.getElementById('loading').classList.add('hidden');
          allRequests = snap.docs.map((d) => ({ id: d.id, ...d.data() }));
          renderList();
        }, (err) => {
          console.error('Prayer load failed:', err);
          document.getElementById('loading').innerHTML =
            '<p class="text-red-500">Failed to load prayer requests.</p>';
        });
    }

    document.addEventListener('nav-loaded', loadPrayer);
  </script>
</body>
</html>
