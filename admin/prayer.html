<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0A3D62">
  <title>Prayer Moderation | EGC Admin</title>

  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="/firebase-config.js"></script>
  <script src="/js/admin-auth.js"></script>
</head>
<body class="bg-zinc-50 font-sans overflow-x-hidden">

  <div id="nav-placeholder"></div>

  <!-- PAGE HEADER -->
  <div class="bg-[#0A3D62] text-white py-10 px-6">
    <div class="max-w-7xl mx-auto">
      <h1 class="text-3xl font-bold tracking-tight">Prayer Moderation</h1>
      <p class="text-blue-200 mt-1">Review and manage all prayer requests including private ones</p>
    </div>
  </div>

  <!-- FILTER TABS -->
  <div class="bg-white border-b px-6">
    <div class="max-w-7xl mx-auto flex gap-6 text-sm font-medium">
      <button onclick="setFilter('all')" id="tab-all"
              class="py-3 border-b-2 border-amber-500 text-amber-600 transition-colors">
        All
      </button>
      <button onclick="setFilter('public')" id="tab-public"
              class="py-3 border-b-2 border-transparent text-zinc-500 hover:text-zinc-700 transition-colors">
        Public
      </button>
      <button onclick="setFilter('private')" id="tab-private"
              class="py-3 border-b-2 border-transparent text-zinc-500 hover:text-zinc-700 transition-colors">
        Private
      </button>
    </div>
  </div>

  <!-- PRAYER LIST -->
  <main class="max-w-7xl mx-auto px-6 py-8">
    <div id="loading" class="text-center py-16 text-zinc-400">
      <i class="fas fa-spinner fa-spin text-3xl mb-3"></i>
      <p>Loading prayer requests...</p>
    </div>
    <div id="empty" class="hidden text-center py-16 text-zinc-400">
      <i class="fas fa-hands-praying text-5xl mb-4 opacity-30"></i>
      <p class="text-lg font-medium">No prayer requests</p>
    </div>
    <div id="prayer-list" class="space-y-4"></div>
  </main>

  <script src="/js/nav.js"></script>
  <script src="/js/main.js"></script>
  <script>
    const db = firebase.firestore();
    let currentFilter = 'all';
    let allRequests = [];

    function setFilter(filter) {
      currentFilter = filter;
      ['all', 'public', 'private'].forEach((f) => {
        const tab = document.getElementById(`tab-${f}`);
        if (f === filter) {
          tab.classList.add('border-amber-500', 'text-amber-600');
          tab.classList.remove('border-transparent', 'text-zinc-500', 'hover:text-zinc-700');
        } else {
          tab.classList.remove('border-amber-500', 'text-amber-600');
          tab.classList.add('border-transparent', 'text-zinc-500', 'hover:text-zinc-700');
        }
      });
      renderList();
    }

    function renderList() {
      const list = document.getElementById('prayer-list');
      const empty = document.getElementById('empty');
      list.innerHTML = '';

      let filtered = allRequests;
      if (currentFilter === 'public') filtered = allRequests.filter((r) => !r.isPrivate);
      if (currentFilter === 'private') filtered = allRequests.filter((r) => r.isPrivate);

      if (filtered.length === 0) {
        empty.classList.remove('hidden');
        return;
      }
      empty.classList.add('hidden');

      filtered.forEach((r) => {
        const prayCount = (r.prayedFor || []).length;
        const date = r.submittedAt?.toDate
          ? r.submittedAt.toDate().toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' })
          : '';
        const authorDisplay = r.isAnonymous ? 'Anonymous' : (r.authorName || 'Member');

        const card = document.createElement('div');
        card.className = `bg-white rounded-2xl border shadow-sm p-6 ${r.isPrivate ? 'border-purple-200' : 'border-zinc-200'}`;
        card.innerHTML = `
          <div class="flex justify-between items-start gap-4">
            <div class="flex-1 min-w-0">
              ${r.isPrivate ? '<span class="inline-block bg-purple-100 text-purple-600 text-xs font-medium px-2 py-0.5 rounded-full mb-2">Private</span>' : ''}
              <p class="text-zinc-700 leading-relaxed whitespace-pre-wrap">${escapeHtml(r.body)}</p>
              <div class="mt-3 flex flex-wrap items-center gap-3 text-xs text-zinc-400">
                <span><i class="fas fa-user mr-1"></i>${escapeHtml(authorDisplay)}</span>
                ${date ? `<span><i class="fas fa-calendar mr-1"></i>${date}</span>` : ''}
                ${r.isAnonymous ? '<span class="bg-zinc-100 px-2 py-0.5 rounded-full">Anonymous</span>' : ''}
                <span><i class="fas fa-hands-praying mr-1"></i>${prayCount} praying</span>
              </div>
            </div>
            <button onclick="deleteRequest('${r.id}')"
                    class="text-zinc-300 hover:text-red-500 transition-colors flex-shrink-0" title="Delete">
              <i class="fas fa-trash"></i>
            </button>
          </div>
        `;
        list.appendChild(card);
      });
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    async function deleteRequest(id) {
      if (!confirm('Delete this prayer request? This cannot be undone.')) return;
      try {
        await db.collection('prayer').doc(id).delete();
      } catch (err) {
        console.error('Delete failed:', err);
        alert('Failed to delete. Please try again.');
      }
    }

    function loadPrayer() {
      db.collection('prayer')
        .orderBy('submittedAt', 'desc')
        .onSnapshot((snap) => {
          document.getElementById('loading').classList.add('hidden');
          allRequests = snap.docs.map((d) => ({ id: d.id, ...d.data() }));
          renderList();
        }, (err) => {
          console.error('Prayer load failed:', err);
          document.getElementById('loading').innerHTML =
            '<p class="text-red-500">Failed to load prayer requests.</p>';
        });
    }

    document.addEventListener('nav-loaded', loadPrayer);
  </script>
</body>
</html>
