<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0A3D62">
  <title>Gallery Management | EGC Admin</title>

  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
</head>
<body class="bg-zinc-50 font-sans overflow-x-hidden" data-feature-gate="gallery">

  <!-- Navigation (shared — see admin-nav.html, injected by js/nav.js) -->
  <div id="nav-placeholder" class="contents"></div>

  <!-- PAGE HEADER -->
  <div class="bg-[#0A3D62] text-white py-10 px-6">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
      <div>
        <h1 class="text-3xl font-bold tracking-tight">Gallery Management</h1>
        <p class="text-blue-200 mt-1">Create photo galleries for public, members, or youth</p>
      </div>
      <button onclick="openForm()"
              class="bg-amber-500 hover:bg-amber-600 text-white px-6 py-2.5 rounded-full text-sm font-medium transition-all">
        <i class="fas fa-plus mr-2"></i>Add Gallery
      </button>
    </div>
  </div>

  <!-- ADD/EDIT FORM -->
  <div id="gallery-form" class="hidden bg-white border-b shadow-sm">
    <div class="max-w-7xl mx-auto px-6 py-8">
      <h2 class="text-xl font-bold text-[#0A3D62] mb-6" id="form-title">Add New Gallery</h2>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

        <!-- Title -->
        <div class="md:col-span-2">
          <label class="block text-sm font-medium text-gray-700 mb-1">Title *</label>
          <input id="f-title" type="text" placeholder="Gallery title"
                 class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400">
        </div>

        <!-- Description -->
        <div class="md:col-span-2">
          <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
          <textarea id="f-description" rows="2" placeholder="Describe this gallery..."
                    class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400 resize-none"></textarea>
        </div>

        <!-- Date -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Date</label>
          <input id="f-date" type="date"
                 class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400">
        </div>

        <!-- Audience -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Audience *</label>
          <select id="f-audience"
                  class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400 bg-white">
            <option value="public">Public</option>
            <option value="members">Members only</option>
            <option value="youth">Youth</option>
          </select>
        </div>

        <!-- Images -->
        <div class="md:col-span-2">
          <label class="block text-sm font-medium text-gray-700 mb-1">Images</label>
          <div id="existing-images" class="flex flex-wrap gap-3 mb-3"></div>
          <div class="flex items-center gap-4 flex-wrap">
            <input id="f-images" type="file" accept="image/*" multiple
                   onchange="onFilesSelected(this)"
                   class="text-sm text-gray-600 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-amber-100 file:text-amber-700 hover:file:bg-amber-200">
            <label class="flex items-center gap-2 text-sm text-gray-600 cursor-pointer select-none whitespace-nowrap">
              <input id="f-hires" type="checkbox" class="w-4 h-4 accent-amber-500">
              High resolution (no compression)
            </label>
          </div>
          <p class="text-xs text-gray-400 mt-1">Images are compressed to 1920px / 85% quality by default. Tick <em>High resolution</em> to upload originals. Drag thumbnails to reorder. Click to preview full-size.</p>
        </div>

        <!-- Published toggle -->
        <div class="flex items-center gap-3">
          <input id="f-published" type="checkbox" class="w-4 h-4 accent-amber-500">
          <label for="f-published" class="text-sm font-medium text-gray-700">Published (visible on site)</label>
        </div>

      </div>
      <div class="flex gap-3 mt-6">
        <button id="save-btn" onclick="saveGallery()"
                class="bg-amber-500 hover:bg-amber-600 text-white px-8 py-3 rounded-full text-sm font-medium transition-all">
          Save Gallery
        </button>
        <button onclick="closeForm()"
                class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-8 py-3 rounded-full text-sm font-medium transition-all">
          Cancel
        </button>
      </div>
    </div>
  </div>

  <!-- GALLERY LIST -->
  <main class="max-w-7xl mx-auto px-6 py-10">
    <div id="gallery-list" class="space-y-4">
      <div class="text-center py-12 text-gray-400">
        <i class="fas fa-spinner fa-spin text-3xl mb-3"></i>
        <p>Loading galleries...</p>
      </div>
    </div>
  </main>

  <!-- LIGHTBOX -->
  <div id="gallery-lightbox"
       class="hidden fixed inset-0 bg-black/90 z-50 flex-col items-center justify-center">
    <div class="absolute top-4 right-4 flex gap-3 z-10">
      <button onclick="removeLightboxItem()"
              class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-full text-sm font-medium transition flex items-center gap-2">
        <i class="fas fa-trash"></i> Remove
      </button>
      <button onclick="closeLightbox()"
              class="bg-white/20 hover:bg-white/30 text-white px-4 py-2 rounded-full text-sm font-medium transition flex items-center gap-2">
        <i class="fas fa-times"></i> Close
      </button>
    </div>
    <div class="flex items-center gap-6 w-full justify-center px-16">
      <button onclick="lightboxPrev()"
              class="text-white/60 hover:text-white text-3xl w-12 h-12 flex items-center justify-center shrink-0 transition">
        <i class="fas fa-chevron-left"></i>
      </button>
      <img id="lightbox-img" src="" alt=""
           class="max-h-[80vh] max-w-full object-contain rounded-xl shadow-2xl">
      <button onclick="lightboxNext()"
              class="text-white/60 hover:text-white text-3xl w-12 h-12 flex items-center justify-center shrink-0 transition">
        <i class="fas fa-chevron-right"></i>
      </button>
    </div>
    <p id="lightbox-counter" class="text-white/50 text-sm mt-4"></p>
  </div>

  <!-- TOAST -->
  <div id="toast"
       class="fixed bottom-6 right-6 z-50 hidden px-6 py-3 rounded-2xl text-white text-sm font-medium shadow-lg transition-all">
  </div>

  <script src="/firebase-config.js"></script>
  <script src="/js/nav.js"></script>
  <script src="/js/main.js"></script>
  <script src="/js/storage-upload.js"></script>
  <script src="/js/permissions.js"></script>
  <script src="/js/admin-auth.js" data-require-perm="gallery.manage"></script>
  <script>
    const db = firebase.firestore();
    let editingId = null;
    let stagedFiles  = [];   // { file, objectUrl, hiRes }
    let removedImages = [];  // existing URLs removed during this edit (deleted from Storage on save)
    let isDragging = false;
    let lightboxItems = [];
    let lightboxIdx = 0;
    const galleriesCache = {};

    // ─── Toast ───────────────────────────────────────────────────────────────────
    function showToast(message, type) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = 'fixed bottom-6 right-6 z-50 px-6 py-3 rounded-2xl text-white text-sm font-medium shadow-lg transition-all '
        + (type === 'error' ? 'bg-red-600' : 'bg-green-600');
      setTimeout(() => toast.classList.add('hidden'), 3000);
    }

    // ─── Thumbnail render ─────────────────────────────────────────────────────
    function renderThumbnail({ key, src }) {
      const container = document.getElementById('existing-images');

      const div = document.createElement('div');
      div.className = 'relative group cursor-grab';
      div.dataset.galleryKey = key;
      div.draggable = true;

      const img = document.createElement('img');
      img.src = src;
      img.className = 'w-24 h-24 object-cover rounded-xl border border-gray-200 cursor-pointer';

      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'absolute -top-2 -right-2 bg-red-600 text-white w-6 h-6 rounded-full text-xs flex items-center justify-center shadow opacity-0 group-hover:opacity-100 transition';
      btn.innerHTML = '<i class="fas fa-times"></i>';
      btn.addEventListener('click', () => removeThumbnail(div, key));

      img.addEventListener('click', () => {
        if (isDragging) return;
        const items = [...document.getElementById('existing-images').children];
        openLightbox(items.indexOf(div));
      });

      div.appendChild(img);
      div.appendChild(btn);
      setupDrag(div);
      container.appendChild(div);
    }

    function removeThumbnail(wrapper, key) {
      if (key.startsWith('existing_')) {
        removedImages.push(decodeURIComponent(key.replace('existing_', '')));
      } else if (key.startsWith('staged_')) {
        const idx = parseInt(key.replace('staged_', ''));
        if (stagedFiles[idx]) { URL.revokeObjectURL(stagedFiles[idx].objectUrl); stagedFiles[idx] = null; }
      }
      wrapper.remove();
    }

    // ─── Drag and drop ────────────────────────────────────────────────────────
    let dragSrc = null;

    function setupDrag(el) {
      el.addEventListener('dragstart', e => {
        isDragging = true;
        dragSrc = el;
        e.dataTransfer.effectAllowed = 'move';
        el.classList.add('opacity-50');
      });
      el.addEventListener('dragover', e => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
      });
      el.addEventListener('drop', e => {
        e.preventDefault();
        if (dragSrc && dragSrc !== el) {
          const container = document.getElementById('existing-images');
          const children = [...container.children];
          const srcIdx = children.indexOf(dragSrc);
          const tgtIdx = children.indexOf(el);
          if (srcIdx < tgtIdx) el.after(dragSrc); else el.before(dragSrc);
        }
      });
      el.addEventListener('dragend', () => {
        el.classList.remove('opacity-50');
        setTimeout(() => { isDragging = false; }, 0);
        dragSrc = null;
      });
    }

    // ─── Lightbox ─────────────────────────────────────────────────────────────
    function openLightbox(idx) {
      lightboxItems = [...document.getElementById('existing-images').children];
      lightboxIdx = Math.max(0, Math.min(idx, lightboxItems.length - 1));
      renderLightbox();
      const lb = document.getElementById('gallery-lightbox');
      lb.classList.remove('hidden');
      lb.classList.add('flex');
    }

    function renderLightbox() {
      if (!lightboxItems.length) { closeLightbox(); return; }
      const img = lightboxItems[lightboxIdx]?.querySelector('img');
      document.getElementById('lightbox-img').src = img ? img.src : '';
      document.getElementById('lightbox-counter').textContent =
        `${lightboxIdx + 1} / ${lightboxItems.length}`;
    }

    function lightboxPrev() {
      if (lightboxIdx > 0) { lightboxIdx--; renderLightbox(); }
    }

    function lightboxNext() {
      if (lightboxIdx < lightboxItems.length - 1) { lightboxIdx++; renderLightbox(); }
    }

    function closeLightbox() {
      const lb = document.getElementById('gallery-lightbox');
      lb.classList.add('hidden');
      lb.classList.remove('flex');
    }

    function removeLightboxItem() {
      if (!lightboxItems.length) return;
      const el = lightboxItems[lightboxIdx];
      removeThumbnail(el, el.dataset.galleryKey);
      lightboxItems.splice(lightboxIdx, 1);
      if (lightboxIdx >= lightboxItems.length) lightboxIdx = Math.max(0, lightboxItems.length - 1);
      if (!lightboxItems.length) { closeLightbox(); return; }
      renderLightbox();
    }

    document.addEventListener('keydown', e => {
      if (document.getElementById('gallery-lightbox').classList.contains('hidden')) return;
      if (e.key === 'Escape') closeLightbox();
      else if (e.key === 'ArrowLeft') lightboxPrev();
      else if (e.key === 'ArrowRight') lightboxNext();
      else if (e.key === 'Delete' || e.key === 'Backspace') { e.preventDefault(); removeLightboxItem(); }
    });

    // ─── File selection ────────────────────────────────────────────────────────
    function onFilesSelected(input) {
      const hiRes = document.getElementById('f-hires').checked;
      Array.from(input.files).forEach(file => {
        const objectUrl = URL.createObjectURL(file);
        const idx = stagedFiles.length;
        stagedFiles.push({ file, objectUrl, hiRes });
        renderThumbnail({ key: `staged_${idx}`, src: objectUrl });
      });
      input.value = '';
      document.getElementById('f-hires').checked = false;
    }

    // ─── Form ─────────────────────────────────────────────────────────────────
    function openForm(id) {
      editingId = id || null;
      const g = id ? galleriesCache[id] : null;

      document.getElementById('form-title').textContent = id ? 'Edit Gallery' : 'Add New Gallery';
      document.getElementById('f-title').value       = g?.title       || '';
      document.getElementById('f-description').value = g?.description || '';
      document.getElementById('f-audience').value    = g?.audience    || 'public';
      document.getElementById('f-published').checked = g?.published   ?? true;
      document.getElementById('f-date').value        = splitDate(g?.date) || today();
      document.getElementById('f-images').value      = '';

      stagedFiles = [];
      removedImages = [];
      document.getElementById('existing-images').innerHTML = '';

      (g?.imageUrls || []).forEach(url => {
        renderThumbnail({ key: `existing_${encodeURIComponent(url)}`, src: url });
      });

      document.getElementById('gallery-form').classList.remove('hidden');
      document.getElementById('gallery-form').scrollIntoView({ behavior: 'smooth' });
    }

    function closeForm() {
      stagedFiles.forEach(s => s && URL.revokeObjectURL(s.objectUrl));
      stagedFiles = [];
      removedImages = [];
      editingId = null;
      document.getElementById('existing-images').innerHTML = '';
      document.getElementById('gallery-form').classList.add('hidden');
    }

    function setSaving(isSaving) {
      const btn = document.getElementById('save-btn');
      btn.disabled = isSaving;
      btn.textContent = isSaving ? 'Saving...' : 'Save Gallery';
      btn.classList.toggle('opacity-60', isSaving);
      btn.classList.toggle('cursor-not-allowed', isSaving);
    }

    async function saveGallery() {
      const title = document.getElementById('f-title').value.trim();
      if (!title) { showToast('Title is required.', 'error'); return; }

      setSaving(true);
      try {
        const ref = editingId
          ? db.collection('gallery').doc(editingId)
          : db.collection('gallery').doc();
        const galleryId = ref.id;

        // Upload staged files (only those still in the DOM)
        const stagedKeyToUrl = {};
        for (const el of document.getElementById('existing-images').children) {
          const key = el.dataset.galleryKey;
          if (key && key.startsWith('staged_')) {
            const idx = parseInt(key.replace('staged_', ''));
            if (stagedFiles[idx]) {
              const { file, hiRes } = stagedFiles[idx];
              const path = `gallery/${galleryId}/${Date.now()}_${idx}_${safeName(file.name)}`;
              const blob = hiRes ? file : await compressImage(file);
              stagedKeyToUrl[key] = await uploadMedia(path, blob);
            }
          }
        }

        // Walk DOM in order to build final imageUrls
        const imageUrls = [];
        for (const el of document.getElementById('existing-images').children) {
          const key = el.dataset.galleryKey;
          if (key.startsWith('existing_')) {
            imageUrls.push(decodeURIComponent(key.replace('existing_', '')));
          } else if (key.startsWith('staged_') && stagedKeyToUrl[key]) {
            imageUrls.push(stagedKeyToUrl[key]);
          }
        }

        const dateVal = document.getElementById('f-date').value;
        const data = {
          title,
          description : document.getElementById('f-description').value.trim(),
          audience    : document.getElementById('f-audience').value,
          published   : document.getElementById('f-published').checked,
          date        : dateVal ? buildTimestamp(dateVal) : null,
          imageUrls,
          thumbnailUrl: imageUrls[0] || null,
          updatedAt   : firebase.firestore.FieldValue.serverTimestamp(),
        };

        if (!editingId) {
          data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
          data.createdBy = firebase.auth().currentUser ? firebase.auth().currentUser.uid : null;
        }

        await ref.set(data, { merge: true });
        await Promise.all(removedImages.map(url => deleteMedia(url)));

        closeForm();
        showToast('Gallery saved.', 'success');
        loadGalleries();
      } catch (err) {
        console.error(err);
        showToast('Error saving gallery: ' + err.message, 'error');
      } finally {
        // Reset the button on success too — otherwise it stays stuck on
        // "Saving..." when the form is reopened (needed a page refresh before).
        setSaving(false);
      }
    }

    async function deleteGallery(id, title) {
      if (!confirm('Delete "' + title + '" and all its images? This cannot be undone.')) return;
      const g = galleriesCache[id];
      try {
        await db.collection('gallery').doc(id).delete();
        await Promise.all((g?.imageUrls || []).map(url => deleteMedia(url)));
        showToast('Gallery deleted.', 'success');
        loadGalleries();
      } catch (err) {
        showToast('Error: ' + err.message, 'error');
      }
    }

    // ─── List ─────────────────────────────────────────────────────────────────
    function loadGalleries() {
      const list = document.getElementById('gallery-list');
      list.innerHTML = `<div class="text-center py-12 text-gray-400">
        <i class="fas fa-spinner fa-spin text-3xl mb-3"></i><p>Loading...</p>
      </div>`;

      db.collection('gallery').orderBy('createdAt', 'desc').get()
        .then(snapshot => {
          if (snapshot.empty) {
            list.innerHTML = `<div class="text-center py-12 text-gray-400">
              <i class="fas fa-images text-3xl mb-3"></i>
              <p>No galleries yet. Click Add Gallery to get started.</p>
            </div>`;
            return;
          }

          list.innerHTML = '';
          snapshot.forEach(doc => {
            const g = doc.data();
            galleriesCache[doc.id] = g;

            const count    = (g.imageUrls || []).length;
            const cover    = g.thumbnailUrl || (g.imageUrls || [])[0] || '';
            const audBadge = audienceBadge(g.audience);
            const pubBadge = g.published
              ? '<span class="text-xs px-2 py-1 rounded-full bg-green-100 text-green-700">Published</span>'
              : '<span class="text-xs px-2 py-1 rounded-full bg-gray-100 text-gray-500">Draft</span>';

            const thumb = cover
              ? `<img src="${cover}" class="w-16 h-16 object-cover rounded-xl shrink-0">`
              : `<div class="w-16 h-16 rounded-xl bg-gradient-to-br from-[#0A3D62] to-amber-500 flex items-center justify-center shrink-0">
                   <i class="fas fa-images text-white"></i>
                 </div>`;

            list.innerHTML += `
              <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-6 flex flex-col md:flex-row md:items-center gap-4">
                ${thumb}
                <div class="flex-1 min-w-0">
                  <div class="flex flex-wrap items-center gap-2 mb-2">
                    ${pubBadge}
                    ${audBadge}
                    <span class="text-xs px-2 py-1 rounded-full bg-gray-100 text-gray-600">${count} ${count === 1 ? 'image' : 'images'}</span>
                  </div>
                  <p class="font-semibold text-gray-900 truncate">${escHtml(g.title)}</p>
                  ${g.date ? `<p class="text-sm text-gray-500 mt-1"><i class="fas fa-calendar text-amber-400 mr-1"></i>${formatTimestamp(g.date)}</p>` : ''}
                </div>
                <div class="flex gap-2 shrink-0">
                  <button onclick="openForm('${doc.id}')"
                          class="bg-blue-50 hover:bg-blue-100 text-blue-600 text-sm px-4 py-2 rounded-full transition">
                    <i class="fas fa-edit mr-1"></i>Edit
                  </button>
                  <button onclick="deleteGallery('${doc.id}', '${escAttr(g.title)}')"
                          class="bg-red-50 hover:bg-red-100 text-red-600 text-sm px-4 py-2 rounded-full transition">
                    <i class="fas fa-trash mr-1"></i>Delete
                  </button>
                </div>
              </div>`;
          });
        })
        .catch(err => {
          list.innerHTML = `<div class="text-center py-12 text-red-400"><p>Error loading galleries.</p></div>`;
          console.error(err);
        });
    }

    // ─── Helpers ──────────────────────────────────────────────────────────────
    function audienceBadge(aud) {
      const map = {
        public  : 'bg-blue-100 text-blue-700',
        members : 'bg-purple-100 text-purple-700',
        youth   : 'bg-pink-100 text-pink-700',
      };
      const label = aud ? aud.charAt(0).toUpperCase() + aud.slice(1) : 'Public';
      return `<span class="text-xs px-2 py-1 rounded-full ${map[aud] || map.public}">${label}</span>`;
    }

    function safeName(name) { return String(name).replace(/[^a-zA-Z0-9._-]/g, '_'); }
    function today() { return new Date().toISOString().slice(0, 10); }

    function buildTimestamp(dateStr) {
      return firebase.firestore.Timestamp.fromDate(new Date(dateStr + 'T00:00:00'));
    }

    function splitDate(ts) {
      if (!ts) return '';
      const d = typeof ts.toDate === 'function' ? ts.toDate() : new Date(ts);
      return d.toISOString().slice(0, 10);
    }

    function formatTimestamp(ts) {
      if (!ts) return '';
      const d = typeof ts.toDate === 'function' ? ts.toDate() : new Date(ts);
      return d.toLocaleDateString('en-ZA', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    function escHtml(str) {
      return String(str || '')
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function escAttr(str) {
      return String(str || '').replace(/'/g, "\\'").replace(/"/g, '&quot;');
    }

    document.addEventListener('DOMContentLoaded', () => loadGalleries());
  </script>
</body>
</html>
