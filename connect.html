<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0A3D62">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="EGC">
  <link rel="apple-touch-icon" href="assets/images/icons/icon-192.png">
  <title>Connect | Emmanuel Gospel Centre</title>

  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>
<body class="bg-zinc-50 font-sans">

  <!-- Navigation (shared — see nav.html, injected by js/nav.js) -->
  <div id="nav-placeholder" class="contents"></div>

  <!-- Header -->
  <header data-hero-banner class="relative -mt-16 pt-32 pb-16 bg-[#0A3D62] text-white">
    <div class="max-w-7xl mx-auto px-6 text-center">
      <h1 class="text-5xl font-bold mb-4">Connect With Us</h1>
      <p class="text-amber-200 max-w-lg mx-auto">New here or want to get in touch? Send us a message and we'll be in contact.</p>
    </div>
  </header>

  <div class="max-w-2xl mx-auto px-6 py-14">
    <div class="bg-white rounded-3xl shadow-sm border border-gray-100 p-8 md:p-10">

      <!-- Success state -->
      <div id="success-msg" class="hidden text-center py-10">
        <i class="fas fa-circle-check text-green-500 text-5xl mb-4"></i>
        <h2 class="text-2xl font-bold text-[#0A3D62] mb-2">Thank you!</h2>
        <p class="text-gray-600">We've received your message and will be in touch soon.</p>
        <button onclick="resetForm()"
                class="mt-6 bg-amber-500 hover:bg-amber-600 text-white px-6 py-3 rounded-full text-sm font-medium transition-all">
          Send another message
        </button>
      </div>

      <!-- Form -->
      <form id="connect-form" class="space-y-5">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Name *</label>
          <input id="f-name" type="text" placeholder="Your name"
                 class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Email *</label>
          <input id="f-email" type="email" placeholder="you@example.com"
                 class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Phone (optional)</label>
          <input id="f-phone" type="tel" placeholder="+27 xx xxx xxxx"
                 class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Message *</label>
          <textarea id="f-message" rows="5" placeholder="How can we help or pray for you?"
                    class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400 resize-none"></textarea>
        </div>

        <p id="form-error" class="hidden text-sm text-red-500"></p>

        <button type="submit" id="submit-btn"
                class="w-full bg-amber-500 hover:bg-amber-600 text-white py-4 rounded-2xl font-semibold transition-all">
          Send Message
        </button>
      </form>

    </div>
  </div>

  <script src="firebase-config.js"></script>
  <script src="/js/nav.js"></script>
  <script src="js/main.js"></script>
  <script src="js/connect.js"></script>
</body>
</html>
