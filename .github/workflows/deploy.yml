name: Deploy to Production

# Runs automatically when a PR is merged to main.
# Deploys the static site to Firebase Hosting (production target only).
# Cloud Functions are NOT auto-deployed — run `firebase deploy --only functions` manually after merging any changes to functions/.
#
# NEW CHURCH SETUP — two things to change in this file:
#   1. projectId below — replace "egc-church" with your Firebase project ID
#      (the project ID is shown in Firebase console > Project settings)
#   2. Add FIREBASE_SERVICE_ACCOUNT to your GitHub repo secrets:
#      GitHub repo > Settings > Secrets and variables > Actions > New repository secret
#      Name:  FIREBASE_SERVICE_ACCOUNT
#      Value: paste the contents of a Firebase service account JSON key
#             (Firebase console > Project settings > Service accounts > Generate new private key)

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Firebase Production
        run: |
          printf '%s' "$FIREBASE_SA" > /tmp/sa.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa.json
          DEPLOY_FAILED=0
          npx firebase-tools@latest deploy \
            --only hosting:production \
            --project egc-church 2>&1 || DEPLOY_FAILED=1
          rm -f /tmp/sa.json
          exit $DEPLOY_FAILED
        env:
          FIREBASE_SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
