name: PR Preview Deploy

# Deploys each PR to a temporary Firebase Hosting preview channel on your
# staging site. The preview URL is posted as a comment on the PR automatically.
# Old preview channels are cleaned up when a new PR is opened.
#
# NEW CHURCH SETUP — three values to change in this file:
#   1. projectId (near the bottom) — replace "egc-church" with your Firebase project ID
#   2. The two occurrences of "egc-staging777" — replace with your staging site name
#      (the site name you created in Firebase Hosting for staging, e.g. "grace-staging")
#   3. Add FIREBASE_SERVICE_ACCOUNT to your GitHub repo secrets (see deploy.yml for instructions)
#
# Your staging and production site names are set in .firebaserc under "targets".

on:
  pull_request:
    branches: [main]

permissions:
  checks: write
  contents: read
  pull-requests: write

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clean up stale PR preview channels
        run: |
          printf '%s' "$FIREBASE_SA" > /tmp/sa.json
          gcloud auth activate-service-account --key-file=/tmp/sa.json --quiet 2>/dev/null || true
          TOKEN=$(gcloud auth print-access-token 2>/dev/null || true)
          rm -f /tmp/sa.json
          [ -z "$TOKEN" ] && { echo "Skipping cleanup — no token"; exit 0; }
          curl -sf -H "Authorization: Bearer $TOKEN" \
            "https://firebasehosting.googleapis.com/v1beta1/projects/egc-church/sites/egc-staging777/channels?pageSize=50" \
            > /tmp/channels.json || echo '{"channels":[]}' > /tmp/channels.json
          CURRENT="pr-${{ github.event.number }}" TOKEN="$TOKEN" python3 << 'PYEOF'
          import json, os, urllib.request
          with open('/tmp/channels.json') as f:
              data = json.load(f)
          current = os.environ.get('CURRENT', '')
          token = os.environ.get('TOKEN', '')
          # CHANGE: replace egc-church with your project ID, egc-staging777 with your staging site name
          base = 'https://firebasehosting.googleapis.com/v1beta1/projects/egc-church/sites/egc-staging777/channels'
          for ch in data.get('channels', []):
              name = ch.get('name', '').split('/')[-1]
              if name.startswith('pr-') and name != current:
                  print(f'Deleting {name}')
                  try:
                      urllib.request.urlopen(urllib.request.Request(
                          f'{base}/{name}', method='DELETE',
                          headers={'Authorization': f'Bearer {token}'}))
                      print(f'  Deleted')
                  except Exception as e:
                      print(f'  Warning: {e}')
          PYEOF
          rm -f /tmp/channels.json
        env:
          FIREBASE_SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Deploy preview to Firebase Hosting
        id: deploy
        run: |
          printf '%s' "$FIREBASE_SA" > /tmp/sa.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa.json
          DEPLOY_FAILED=0
          npx firebase-tools@latest hosting:channel:deploy \
            pr-${{ github.event.number }} \
            --only staging \
            --expires 7d \
            --project egc-church 2>&1 | tee /tmp/deploy-out.txt || DEPLOY_FAILED=1
          rm -f /tmp/sa.json
          if [ "$DEPLOY_FAILED" -eq 1 ]; then
            echo "Deploy failed"
            exit 1
          fi
          URL=$(grep -oE 'https://[a-z0-9-]+\.web\.app' /tmp/deploy-out.txt | head -1)
          [ -n "$URL" ] && echo "preview_url=$URL" >> "$GITHUB_OUTPUT" || true
        env:
          FIREBASE_SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Post preview URL to PR
        if: steps.deploy.outputs.preview_url != ''
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## Preview deployed\n\n**Staging preview:** ${{ steps.deploy.outputs.preview_url }}`
            });
