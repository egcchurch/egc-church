<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0A3D62">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="EGC">
  <link rel="apple-touch-icon" href="assets/images/icons/icon-192.png">
  <title>Member Login | Emmanuel Gospel Centre</title>

  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
  <link rel="stylesheet" href="/assets/css/tailwind.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
</head>
<body class="bg-zinc-100 min-h-screen flex items-center justify-center font-sans">

  <div class="max-w-md w-full mx-4">
    <div class="bg-white rounded-3xl shadow-2xl p-8 md:p-10">

      <!-- Logo -->
      <div class="flex justify-center mb-6">
        <div class="w-16 h-16 bg-amber-500 rounded-2xl flex items-center justify-center text-white text-4xl shadow-inner">✝</div>
      </div>

      <!-- Tabs -->
      <div class="flex gap-1 bg-zinc-100 rounded-2xl p-1 mb-8">
        <button id="tab-signin" onclick="showTab('signin')"
                class="flex-1 py-2.5 rounded-xl text-sm font-semibold transition-all bg-white shadow-sm text-[#0A3D62]">
          Sign In
        </button>
        <button id="tab-register" onclick="showTab('register')"
                class="flex-1 py-2.5 rounded-xl text-sm font-semibold transition-all text-gray-500 hover:text-gray-700">
          Create Account
        </button>
      </div>

      <!-- Error message -->
      <div id="auth-error" class="hidden mb-4 p-4 bg-red-50 border border-red-200 rounded-2xl text-sm text-red-700"></div>

      <!-- Success message (register only) -->
      <div id="auth-success" class="hidden mb-4 p-4 bg-green-50 border border-green-200 rounded-2xl text-sm text-green-700"></div>

      <!-- ── SIGN IN ── -->
      <div id="panel-signin">

        <!-- Google -->
        <button onclick="signInWithGoogle()"
                class="w-full flex items-center justify-center gap-3 bg-white border border-gray-300 hover:border-gray-400 py-4 rounded-2xl font-medium transition-all active:scale-[0.98] mb-6">
          <i class="fab fa-google text-red-500 text-xl"></i>
          Continue with Google
        </button>

        <div class="relative my-6">
          <div class="absolute inset-0 flex items-center">
            <div class="w-full border-t border-gray-200"></div>
          </div>
          <div class="relative flex justify-center">
            <span class="bg-white px-4 text-xs uppercase tracking-widest text-gray-400">or sign in with email</span>
          </div>
        </div>

        <form id="signin-form" class="space-y-4">
          <input type="email" id="signin-email" placeholder="Email address"
                 class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:border-amber-500 text-base">
          <input type="password" id="signin-password" placeholder="Password"
                 class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:border-amber-500 text-base">
          <button type="submit"
                  class="w-full bg-amber-500 hover:bg-amber-600 text-white py-4 rounded-2xl font-semibold transition-all">
            Sign In
          </button>
        </form>

        <p class="mt-4 text-center text-sm">
          <button onclick="showForgotPassword()"
                  class="text-amber-600 hover:text-amber-700 font-medium">
            Forgot your password?
          </button>
        </p>

      </div>

      <!-- ── REGISTER ── -->
      <div id="panel-register" class="hidden">

        <!-- Google -->
        <button onclick="signInWithGoogle()"
                class="w-full flex items-center justify-center gap-3 bg-white border border-gray-300 hover:border-gray-400 py-4 rounded-2xl font-medium transition-all active:scale-[0.98] mb-6">
          <i class="fab fa-google text-red-500 text-xl"></i>
          Sign up with Google
        </button>

        <div class="relative my-6">
          <div class="absolute inset-0 flex items-center">
            <div class="w-full border-t border-gray-200"></div>
          </div>
          <div class="relative flex justify-center">
            <span class="bg-white px-4 text-xs uppercase tracking-widest text-gray-400">or create with email</span>
          </div>
        </div>

        <form id="register-form" class="space-y-4">
          <input type="text" id="reg-name" placeholder="Full name"
                 class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:border-amber-500 text-base">
          <input type="email" id="reg-email" placeholder="Email address"
                 class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:border-amber-500 text-base">
          <input type="password" id="reg-password" placeholder="Password (min 8 characters)"
                 class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:border-amber-500 text-base">
          <input type="password" id="reg-confirm" placeholder="Confirm password"
                 class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:border-amber-500 text-base">
          <button type="submit"
                  class="w-full bg-amber-500 hover:bg-amber-600 text-white py-4 rounded-2xl font-semibold transition-all">
            Create Account
          </button>
        </form>

        <p class="mt-4 text-center text-xs text-gray-400">
          Your account will be reviewed before you can access member content.
        </p>

      </div>

      <!-- ── FORGOT PASSWORD ── -->
      <div id="panel-forgot" class="hidden">
        <p class="text-gray-600 text-sm mb-6 text-center">
          Enter your email address and we'll send you a link to reset your password.
        </p>
        <form id="forgot-form" class="space-y-4">
          <input type="email" id="forgot-email" placeholder="Email address"
                 class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:border-amber-500 text-base">
          <button type="submit"
                  class="w-full bg-amber-500 hover:bg-amber-600 text-white py-4 rounded-2xl font-semibold transition-all">
            Send Reset Link
          </button>
        </form>
        <p class="mt-4 text-center text-sm">
          <button onclick="showTab('signin')"
                  class="text-gray-500 hover:text-gray-700">
            ← Back to sign in
          </button>
        </p>
      </div>

    </div>

    <p class="text-center text-gray-500 text-xs mt-10">© Emmanuel Gospel Centre</p>
  </div>

  <script src="firebase-config.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
